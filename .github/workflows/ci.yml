name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (build + checkers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json
      - name: Instalar dependencias
        working-directory: frontend-v2
        run: npm ci
      - name: Build de producción
        working-directory: frontend-v2
        run: npm run build
      - name: Checker i18n (claves faltantes/duplicadas)
        run: node scripts/check-i18n.mjs
      - name: Checker rutas backend (duplicados)
        run: node scripts/check-routes.mjs

  backend:
    name: Backend (sintaxis + contratos + tests de API)
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Sintaxis (py_compile)
        run: python -m py_compile backend/server.py backend/ai_learning.py backend/damage_segmentation.py
      - name: Contratos modelo↔frontend (campos que se descartarían en silencio)
        run: python scripts/check_contracts.py
      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt pytest pytest-asyncio
      - name: Tests de API contra Mongo real (persistencia, auth, demo read-only)
        env:
          SECRET_KEY: test-secret-key-only-for-tests
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test_flotadsp
          GLOBAL_DB_NAME: test_flotadsp_global
        run: pytest backend/tests -q
