            ),

            /* Alerta de matrícula que no coincide */
            item.plate_mismatch && h('div',{style:{
              margin:'12px 20px 0',padding:'10px 14px',borderRadius:'10px',
              background:'rgba(239,68,68,.14)',border:'1px solid rgba(239,68,68,.5)',
              display:'flex',alignItems:'center',gap:'10px'
            }},
              h('span',{style:{fontSize:'18px'}},'⛔'),
              h('div',null,
                h('p',{style:{margin:0,fontSize:'12px',fontWeight:800,color:'#f87171'}},'LA MATRÍCULA NO COINCIDE'),
                h('p',{style:{margin:'2px 0 0',fontSize:'12px',color:'#c8ccd6'}},
                  'En las fotos se lee "'+item.detected_plate+'" pero el vehículo seleccionado es "'+item.license_plate+'". Posible furgoneta equivocada.')
              )
            ),

            /* Avisos de calidad/orden de fotos y fraude */
            ((item.image_quality_warnings&&item.image_quality_warnings.length>0)||(item.fraud_warnings&&item.fraud_warnings.length>0)) && h('div',{style:{
              margin:'12px 20px 0',padding:'10px 14px',borderRadius:'10px',
              background:'rgba(245,158,11,.10)',border:'1px solid rgba(245,158,11,.35)'
            }},
              h('p',{style:{margin:'0 0 6px',fontSize:'11px',fontWeight:800,color:'#fbbf24',letterSpacing:'.04em'}},'⚠️ AVISOS DE LA IA'),
              (item.fraud_warnings||[]).map(function(w,i){
                return h('p',{key:'f'+i,style:{margin:'3px 0',fontSize:'12px',color:'#fca5a5'}},'⛔ '+w);
              }),
              (item.image_quality_warnings||[]).map(function(w,i){
                return h('p',{key:'q'+i,style:{margin:'3px 0',fontSize:'12px',color:'#e5d5b8'}},'• '+w);
              })
            ),

            /* Panel compacto: daños nuevos detectados */
            item.has_reference && item.new_damages_count>0 && h('div',{style:{
              margin:'12px 20px 0',borderRadius:'12px',overflow:'hidden',
              border:'1px solid rgba(239,68,68,.4)',background:'rgba(239,68,68,.07)'
            }},
              h('div',{style:{
                padding:'8px 14px',background:'rgba(239,68,68,.15)',
                display:'flex',alignItems:'center',gap:'8px'
              }},
                h('span',{style:{fontSize:'13px'}},'🆕'),
                h('span',{style:{fontSize:'12px',fontWeight:800,color:'#f87171',letterSpacing:'.04em'}},
                  'DAÑO NUEVO DETECTADO'+(item.new_damages_count>1?' ('+item.new_damages_count+')':'')),
                h('span',{style:{fontSize:'10px',color:'#8892a4',marginLeft:'auto'}},'vs. inspección anterior')
              ),
              item.new_damages.slice(0,5).map(function(nd,di){
                return h('button',{key:di,onClick:function(){jumpToDamage(nd,di,item.photos.length);},style:{
                  display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',
                  padding:'8px 14px',background:highlightDmg===di?'rgba(239,68,68,.12)':'transparent',
                  border:'none',borderTop:'1px solid rgba(239,68,68,.12)',cursor:'pointer'
                }},
                  h('span',{style:{
                    fontSize:'10px',fontWeight:800,color:'#fff',background:sevColor(nd.severity),
                    borderRadius:'5px',padding:'2px 7px',flexShrink:0,textTransform:'uppercase'
                  }},nd.severity||'?'),
                  h('span',{style:{fontSize:'12px',color:'#e5e7eb',fontWeight:600,flexShrink:0}},nd.part||'—'),
                  h('span',{style:{fontSize:'12px',color:'#8892a4',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},nd.description||''),
                  h('span',{style:{fontSize:'10px',color:'#fb923c',marginLeft:'auto',flexShrink:0}},
                    ZONE_LABEL[nd.location_hint]?'📍 '+ZONE_LABEL[nd.location_hint]:''),
                  (function(){
                    var key=item.id+':'+di;
                    var v=fb[key];
                    return h('span',{style:{display:'flex',gap:'4px',flexShrink:0,marginLeft:'6px'}},
                      h('button',{title:'La IA acertó — este daño es real (entrena tu IA propia)',onClick:function(ev){ev.stopPropagation();sendFeedback(item,di,'correct');},style:{
                        width:'24px',height:'24px',borderRadius:'6px',cursor:'pointer',fontSize:'12px',lineHeight:1,padding:0,
                        border:'1px solid '+(v==='correct'?'#22c55e':'rgba(255,255,255,.15)'),
                        background:v==='correct'?'rgba(34,197,94,.25)':'rgba(255,255,255,.04)',
                        color:v==='correct'?'#4ade80':'#8892a4'
                      }},'✓'),
                      h('button',{title:'Falso positivo — la IA se equivocó (entrena tu IA propia)',onClick:function(ev){ev.stopPropagation();sendFeedback(item,di,'wrong');},style:{
                        width:'24px',height:'24px',borderRadius:'6px',cursor:'pointer',fontSize:'12px',lineHeight:1,padding:0,
                        border:'1px solid '+(v==='wrong'?'#ef4444':'rgba(255,255,255,.15)'),
                        background:v==='wrong'?'rgba(239,68,68,.25)':'rgba(255,255,255,.04)',
                        color:v==='wrong'?'#f87171':'#8892a4'
                      }},'✗')
                    );
                  })()
                );
              })
            ),

            /* Info */
            h('div',{style:{padding:'16px 20px',display:'flex',alignItems:'center',gap:'16px',flexWrap:'wrap'}},
              h('div',{style:{flex:1,minWidth:'200px'}},
                h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
                  h('span',{style:{fontFamily:'monospace',fontSize:'17px',fontWeight:800,color:'#f4f5f8'}},item.license_plate),
                  h('span',{style:{fontSize:'11px',fontWeight:700,color:'#8892a4',background:'rgba(255,255,255,.06)',borderRadius:'6px',padding:'2px 8px'}},item.center||'—'),item.dirt_level!=null&&item.dirt_level>=6&&h('span',{style:{fontSize:'11px',fontWeight:700,color:'#a78bfa',background:'rgba(167,139,250,.12)',borderRadius:'6px',padding:'2px 8px'},title:'La IA fue prudente con marcas dudosas por la suciedad'},'🧽 Sucia '+Math.round(item.dirt_level)+'/10')
                ),
                h('p',{style:{margin:'4px 0 0',fontSize:'13px',color:'#8892a4'}},
                  '👤 '+item.driver_name+' · 🕐 '+fmtDate(item.created_at)+(item.vehicle_label?' · '+item.vehicle_label:''))
              )
            ),

            /* Resumen IA */
            item.executive_summary && h('p',{style:{
              margin:'0 20px 16px',padding:'12px 14px',fontSize:'13px',lineHeight:1.5,color:'#c8ccd6',
              background:'rgba(255,255,255,.04)',borderRadius:'10px',borderLeft:'3px solid '+sevColor(item.severity)
            }},item.executive_summary),

            /* Acciones */
            h('div',{style:{display:'flex',gap:'10px',padding:'0 20px 20px'}},
              h('button',{onClick:function(){markReviewed(item);},disabled:marking,style:{
                flex:2,padding:'14px',borderRadius:'12px',fontSize:'15px',fontWeight:800,cursor:'pointer',
                background:'linear-gradient(135deg,#22c55e,#16a34a)',border:'none',color:'#fff',
                boxShadow:'0 4px 18px rgba(34,197,94,.3)'
              }},marking?'…':'✓ Revisada'),
              h('button',{onClick:next,style:{
                flex:1,padding:'14px',borderRadius:'12px',fontSize:'14px',fontWeight:700,cursor:'pointer',
                background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.12)',color:'#c8ccd6'
              }},'Saltar →'),
              h('button',{onClick:function(){if(nav)nav('/inspecciones/'+item.id);},style:{
                padding:'14px 18px',borderRadius:'12px',fontSize:'14px',fontWeight:700,cursor:'pointer',
                background:'rgba(249,115,22,.12)',border:'1px solid rgba(249,115,22,.35)',color:'#fb923c'
              }},'Abrir')
            )
          )
        );
      };
    });
  })();
  </script>
  <!-- FlotaDSP — Vehicle Documents Tab Component -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    var DOC_TYPES = ["ITV","Seguro","Ficha tecnica","Permiso circulacion","Contrato renting","Poliza"];
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function apiGet(p){ return fetch(API+p,{headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiDel(p){ return fetch(API+p,{method:"DELETE",headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiUpload(p,fd){ return fetch(API+p,{method:"POST",headers:{"Authorization":"Bearer "+tok()},body:fd}).then(function(r){return r.json();}); }
    function waitReact(cb){
      var t=setInterval(function(){
        if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);}
      },100);
    }
    waitReact(function(React){
      window.__FlotaDocsTab=function(props){
        var vid=props.vehicleId, toast=props.toast;
        var ds=React.useState([]),docs=ds[0],setDocs=ds[1];
        var ls=React.useState(true),loading=ls[0],setLoading=ls[1];
        var us=React.useState(null),uploading=us[0],setUploading=us[1];
        var fileRef=React.useRef(null);
        var pendingType=React.useRef("");
        React.useEffect(function(){
          if(!vid)return;
          setLoading(true);
          apiGet("/vehicles/"+vid+"/documents").then(function(d){setDocs(Array.isArray(d)?d:[]);setLoading(false);}).catch(function(){setLoading(false);});
        },[vid]);
        function getDoc(type){return docs.find(function(d){return d.doc_type===type;});}
        function onFileChange(e){
          var file=e.target.files&&e.target.files[0];
          if(!file)return;
          var type=pendingType.current;
          setUploading(type);
          var fd=new FormData();fd.append("doc_type",type);fd.append("file",file);
          apiUpload("/vehicles/"+vid+"/documents",fd).then(function(res){
            if(res.id){setDocs(function(prev){return [res].concat(prev.filter(function(d){return d.doc_type!==type;}));});if(toast)toast.success("Documento subido");}
            else{if(toast)toast.error("Error subiendo");}
            setUploading(null);
          }).catch(function(){if(toast)toast.error("Error subiendo");setUploading(null);});
          e.target.value="";
        }
        function doUpload(type){pendingType.current=type;if(fileRef.current)fileRef.current.click();}
        function doDelete(doc){
          if(!confirm("Eliminar "+doc.doc_type+"?"))return;
          apiDel("/vehicles/"+vid+"/documents/"+doc.id).then(function(){setDocs(function(prev){return prev.filter(function(d){return d.id!==doc.id;});});if(toast)toast.success("Eliminado");});
        }
        var TYPES=["ITV","Seguro","Ficha tecnica","Permiso circulacion","Contrato renting","Poliza"];
        var items=[React.createElement("input",{key:"fi",ref:fileRef,type:"file",accept:".pdf,.jpg,.jpeg,.png,.doc,.docx",style:{display:"none"},onChange:onFileChange})];
        TYPES.forEach(function(type){
          var doc=getDoc(type),busy=uploading===type;
          items.push(React.createElement("div",{key:type,className:"card p-4 flex items-center gap-3"},
            React.createElement("div",{className:"w-10 h-10 rounded-lg bg-dark-800 flex items-center justify-center"},React.createElement("span",{style:{fontSize:"18px"}},doc?"📄":"📋")),
            React.createElement("div",{className:"flex-1"},
              React.createElement("p",{className:"text-sm text-dark-200"},type),
              doc?React.createElement("a",{href:doc.url,target:"_blank",rel:"noopener noreferrer",className:"text-[11px] text-emerald-400 hover:underline"},"Ver documento"):React.createElement("p",{className:"text-[11px] text-dark-500"},"No subido")
            ),
            doc?React.createElement("div",{className:"flex gap-2"},
              React.createElement("button",{onClick:function(){doUpload(type);},className:"text-xs text-brand-400 hover:text-brand-300",title:"Reemplazar"},"↑"),
              React.createElement("button",{onClick:function(){doDelete(doc);},className:"text-xs text-red-400 hover:text-red-300",title:"Eliminar"},"🗑")
            ):React.createElement("button",{onClick:function(){doUpload(type);},disabled:busy,className:"text-xs text-brand-400 hover:text-brand-300 disabled:opacity-50"},busy?"...":"Subir")
          ));
        });
        items.push(React.createElement("div",{key:"custom",className:"card p-4 border-dashed border-2 border-dark-700 flex items-center justify-center cursor-pointer hover:border-brand-500/50 transition-colors",onClick:function(){
          var t=prompt("Nombre del documento:");if(!t||!t.trim())return;pendingType.current=t.trim();if(fileRef.current)fileRef.current.click();
        }},React.createElement("span",{className:"text-sm text-dark-400"},loading?"Cargando...":"+ Anadir documento")));
        return React.createElement("div",{className:"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"},items);
      };
    });
  })();
  </script>
