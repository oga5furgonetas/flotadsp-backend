            'No hay empresas registradas en este centro todavía.'),

          !loading && h('div',{style:{display:'flex',flexDirection:'column',gap:'12px'}},
            (items||[]).map(function(it){
              var chk = fmtCheck(it.last_check);
              return h('div',{key:it.id,style:{
                background:'linear-gradient(145deg,rgba(22,24,31,.95),rgba(17,19,24,.98))',
                border:'1px solid rgba(255,255,255,.08)',borderRadius:'16px',padding:'16px 18px'
              }},
                h('div',{style:{display:'flex',alignItems:'flex-start',gap:'12px',flexWrap:'wrap'}},
                  h('div',{style:{flex:1,minWidth:'200px'}},
                    h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
                      h('span',{style:{fontSize:'15px',fontWeight:800,color:'#f4f5f8'}},it.name),
                      chk && h('span',{title:'Última disponibilidad verificada por el equipo',style:{
                        fontSize:'10.5px',fontWeight:700,padding:'2px 9px',borderRadius:'99px',
                        color: chk.stale?'#f59e0b':'#4ade80',
                        background: chk.stale?'rgba(245,158,11,.12)':'rgba(34,197,94,.12)'
                      }}, '✓ '+(chk.available||'verificada')+' · '+chk.when)
                    ),
                    it.address && h('p',{style:{margin:'5px 0 0',fontSize:'12.5px',color:'#8892a4'}},'📍 '+it.address),
                    it.notes && h('p',{style:{margin:'4px 0 0',fontSize:'12px',color:'#6b7280',lineHeight:1.5}},it.notes),
                    chk && chk.note && h('p',{style:{margin:'6px 0 0',fontSize:'12px',color:'#9aa3b5',fontStyle:'italic'}},

                    fontSize:'12.5px',fontWeight:700,textDecoration:'none'

                  it.website && h('a',{href:it.website,target:'_blank',rel:'noopener',style:{

                    display:'inline-flex',alignItems:'center',gap:'6px',padding:'7px 14px',borderRadius:'9px',
                    background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.12)',color:'#c8ccd6',
                    fontSize:'12.5px',fontWeight:600,textDecoration:'none'
                  }},'🗺️ Cómo llegar'),
                  it.email && h('a',{href:'mailto:'+it.email,style:{
                    display:'inline-flex',alignItems:'center',gap:'6px',padding:'7px 14px',borderRadius:'9px',
                    background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.12)',color:'#c8ccd6',
                    fontSize:'12.5px',fontWeight:600,textDecoration:'none'
                  }},'✉️ Email'),
                  h('button',{onClick:function(){ setCheckId(checkId===it.id?null:it.id); setAvail(''); setNote(''); },style:{

                  h('p',{style:{margin:'0 0 8px',fontSize:'11.5px',color:'#fb923c',fontWeight:700}},

  <!-- FlotaDSP — Vehicle Documents Tab Component -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    var DOC_TYPES = ["ITV","Seguro","Ficha tecnica","Permiso circulacion","Contrato renting","Poliza"];
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function apiGet(p){ return fetch(API+p,{headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiDel(p){ return fetch(API+p,{method:"DELETE",headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiUpload(p,fd){ return fetch(API+p,{method:"POST",headers:{"Authorization":"Bearer "+tok()},body:fd}).then(function(r){return r.json();}); }
    function waitReact(cb){
      var t=setInterval(function(){
        if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);}
      },100);
    }
    waitReact(function(React){
      window.__FlotaDocsTab=function(props){
        var vid=props.vehicleId, toast=props.toast;
        var ds=React.useState([]),docs=ds[0],setDocs=ds[1];
        var ls=React.useState(true),loading=ls[0],setLoading=ls[1];
        var us=React.useState(null),uploading=us[0],setUploading=us[1];
        var fileRef=React.useRef(null);
        var pendingType=React.useRef("");
        React.useEffect(function(){
          if(!vid)return;
          setLoading(true);
          apiGet("/vehicles/"+vid+"/documents").then(function(d){setDocs(Array.isArray(d)?d:[]);setLoading(false);}).catch(function(){setLoading(false);});
        },[vid]);
        function getDoc(type){return docs.find(function(d){return d.doc_type===type;});}
        function onFileChange(e){
          var file=e.target.files&&e.target.files[0];
          if(!file)return;
          var type=pendingType.current;
          setUploading(type);
          var fd=new FormData();fd.append("doc_type",type);fd.append("file",file);
          apiUpload("/vehicles/"+vid+"/documents",fd).then(function(res){
            if(res.id){setDocs(function(prev){return [res].concat(prev.filter(function(d){return d.doc_type!==type;}));});if(toast)toast.success("Documento subido");}
            else{if(toast)toast.error("Error subiendo");}
            setUploading(null);
          }).catch(function(){if(toast)toast.error("Error subiendo");setUploading(null);});
          e.target.value="";
        }
        function doUpload(type){pendingType.current=type;if(fileRef.current)fileRef.current.click();}
        function doDelete(doc){
          if(!confirm("Eliminar "+doc.doc_type+"?"))return;
          apiDel("/vehicles/"+vid+"/documents/"+doc.id).then(function(){setDocs(function(prev){return prev.filter(function(d){return d.id!==doc.id;});});if(toast)toast.success("Eliminado");});
        }
        var TYPES=["ITV","Seguro","Ficha tecnica","Permiso circulacion","Contrato renting","Poliza"];
        var items=[React.createElement("input",{key:"fi",ref:fileRef,type:"file",accept:".pdf,.jpg,.jpeg,.png,.doc,.docx",style:{display:"none"},onChange:onFileChange})];
        TYPES.forEach(function(type){
          var doc=getDoc(type),busy=uploading===type;
          items.push(React.createElement("div",{key:type,className:"card p-4 flex items-center gap-3"},
            React.createElement("div",{className:"w-10 h-10 rounded-lg bg-dark-800 flex items-center justify-center"},React.createElement("span",{style:{fontSize:"18px"}},doc?"📄":"📋")),
            React.createElement("div",{className:"flex-1"},
              React.createElement("p",{className:"text-sm text-dark-200"},type),
              doc?React.createElement("a",{href:doc.url,target:"_blank",rel:"noopener noreferrer",className:"text-[11px] text-emerald-400 hover:underline"},"Ver documento"):React.createElement("p",{className:"text-[11px] text-dark-500"},"No subido")
            ),
            doc?React.createElement("div",{className:"flex gap-2"},
              React.createElement("button",{onClick:function(){doUpload(type);},className:"text-xs text-brand-400 hover:text-brand-300",title:"Reemplazar"},"↑"),
              React.createElement("button",{onClick:function(){doDelete(doc);},className:"text-xs text-red-400 hover:text-red-300",title:"Eliminar"},"🗑")
            ):React.createElement("button",{onClick:function(){doUpload(type);},disabled:busy,className:"text-xs text-brand-400 hover:text-brand-300 disabled:opacity-50"},busy?"...":"Subir")
          ));
        });
        items.push(React.createElement("div",{key:"custom",className:"card p-4 border-dashed border-2 border-dark-700 flex items-center justify-center cursor-pointer hover:border-brand-500/50 transition-colors",onClick:function(){
          var t=prompt("Nombre del documento:");if(!t||!t.trim())return;pendingType.current=t.trim();if(fileRef.current)fileRef.current.click();
        }},React.createElement("span",{className:"text-sm text-dark-400"},loading?"Cargando...":"+ Anadir documento")));
        return React.createElement("div",{className:"grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3"},items);
      };
    });
  })();
  </script>

  <!-- FlotaDSP — Cuadrante de turnos (admin): rejilla semanal + solicitudes + cobertura -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function apiGet(p){ return fetch(API+p,{headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiPost(p,b){ return fetch(API+p,{method:"POST",headers:{"Authorization":"Bearer "+tok(),"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){return r.json();}); }
    function waitReact(cb){ var t=setInterval(function(){ if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);} },120); }

    var TYC = { trabaja:{bg:'rgba(34,197,94,.16)',bd:'rgba(34,197,94,.4)',fg:'#22c55e',t:'T'},
                libre:{bg:'rgba(255,255,255,.03)',bd:'rgba(255,255,255,.08)',fg:'#5c6578',t:'·'},
                extra:{bg:'rgba(245,158,11,.16)',bd:'rgba(245,158,11,.4)',fg:'#f59e0b',t:'E'} };
    var NEXT = { libre:'trabaja', trabaja:'extra', extra:'libre' };
    var DOW = ['L','M','X','J','V','S','D'];

    function monday(d){ var x=new Date(d); var day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
    function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function addDays(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
    function pretty(iso){ try{var p=iso.split('-');return p[2]+'/'+p[1];}catch(e){return iso;} }
    function firstOfMonth(d){ var x=new Date(d); x.setDate(1); x.setHours(0,0,0,0); return x; }
    function addMonths(d,n){ var x=new Date(d); x.setDate(1); x.setMonth(x.getMonth()+n); return x; }
    function _dt(iso){ var p=iso.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
    function isWeekend(iso){ var dd=_dt(iso).getDay(); return dd===0||dd===6; }
    function dowLetter(iso){ return ['L','M','X','J','V','S','D'][(_dt(iso).getDay()+6)%7]; }
    function monthName(d){ var s=d.toLocaleDateString('es-ES',{month:'long',year:'numeric'}); return s.charAt(0).toUpperCase()+s.slice(1); }

    waitReact(function(React){
      var h = React.createElement;

      window.__FlotaCuadrante = function(props){
        var toast = props.toast;
        var propCenter = (props.center && props.center!=='Todos') ? props.center : null;
        var cS=React.useState(propCenter||'OGA5'),center=cS[0],setCenter=cS[1];
        React.useEffect(function(){ if(propCenter) setCenter(propCenter); },[props.center]);
        var wS=React.useState(firstOfMonth(new Date())),monStart=wS[0],setMon=wS[1];
        var dS=React.useState([]),drivers=dS[0],setDrivers=dS[1];
        var mS=React.useState({}),map=mS[0],setMap=mS[1];      /* did|date -> type */
        var dirtyS=React.useState({}),dirty=dirtyS[0],setDirty=dirtyS[1];
        var rS=React.useState([]),reqs=rS[0],setReqs=rS[1];
        var lS=React.useState(true),loading=lS[0],setLoading=lS[1];
        var savingS=React.useState(false),saving=savingS[0],setSaving=savingS[1];
        var minS=React.useState(0),minCob=minS[0],setMinCob=minS[1];
        var fileRef=React.useRef(null);
        var scFileRef=React.useRef(null);
        var demS=React.useState({}),demand=demS[0],setDemand=demS[1];   /* date -> {objetivo,maximo} */
        var genS=React.useState(false),showGen=genS[0],setShowGen=genS[1];
        var gpS=React.useState('Los de empresa solo de lunes a viernes. Prioriza eficiencia (no equitativo). Coloca a los novatos L1/L2/L3 con carga progresiva.'),genPrompt=gpS[0],setGenPrompt=gpS[1];
        var ggS=React.useState(false),generating=ggS[0],setGenerating=ggS[1];
        var geS=React.useState(0),genElapsed=geS[0],setGenElapsed=geS[1];
        var grS=React.useState(''),genResumen=grS[0],setGenResumen=grS[1];
        var edS=React.useState(null),editDrv=edS[0],setEditDrv=edS[1];
        var scwS=React.useState({semanas:{},total:0}),scInfo=scwS[0],setScInfo=scwS[1];
        var spS=React.useState([]),scProg=spS[0],setScProg=spS[1];
        var siS=React.useState(false),scImporting=siS[0],setScImporting=siS[1];

        var _dim=new Date(monStart.getFullYear(),monStart.getMonth()+1,0).getDate();
        var days = []; for(var i=0;i<_dim;i++) days.push(fmt(addDays(monStart,i)));
        var desde=days[0], hasta=days[days.length-1];

        function load(){
          setLoading(true);
          Promise.all([
            apiGet('/drivers?center='+encodeURIComponent(center)),
            apiGet('/shifts?center='+encodeURIComponent(center)+'&desde='+desde+'&hasta='+hasta),
            apiGet('/shift-requests?center='+encodeURIComponent(center)+'&status=pendiente'),
            apiGet('/shifts/coverage?center='+encodeURIComponent(center)+'&desde='+desde+'&hasta='+hasta),
            apiGet('/route-demand?center='+encodeURIComponent(center)+'&desde='+desde+'&hasta='+hasta),
            apiGet('/scorecard/standings?center='+encodeURIComponent(center))
          ]).then(function(res){
            setDrivers((Array.isArray(res[0])?res[0]:[]).sort(function(a,b){ return (a.name||'').localeCompare(b.name||'','es',{sensitivity:'base'}); }));
            var m={}; ((res[1]&&res[1].shifts)||[]).forEach(function(s){ m[s.driver_id+'|'+s.date]=s.type; });
            setMap(m); setDirty({});
            setReqs((res[2]&&res[2].requests)||[]);
            setMinCob((res[3]&&res[3].min)||0);
            setDemand((res[4]&&res[4].demand)||{});
            setScInfo(res[5]||{semanas:{},total:0});
            setLoading(false);
          }).catch(function(){ setLoading(false); if(toast)toast.error('Error cargando el cuadrante'); });
        }
        React.useEffect(function(){ load(); },[center, desde]);
        React.useEffect(function(){ if(!generating){ setGenElapsed(0); return; } var s=0; var iv=setInterval(function(){ s++; setGenElapsed(s); },1000); return function(){ clearInterval(iv); }; },[generating]);

        function cellType(did,date){ return map[did+'|'+date]||'libre'; }
        function cycle(did,date){
          var cur=cellType(did,date), nx=NEXT[cur];
          var key=did+'|'+date; var m=Object.assign({},map); m[key]=nx; setMap(m);
          var dd=Object.assign({},dirty); dd[key]=1; setDirty(dd);
        }
        function coverageOf(date){
          var n=0; drivers.forEach(function(d){ var t=cellType(d.id,date); if(t==='trabaja'||t==='extra')n++; }); return n;
        }

        function save(){
          var items=[]; Object.keys(dirty).forEach(function(k){
            var p=k.split('|'); var did=p[0], date=p[1];
            var drv=drivers.filter(function(x){return x.id===did;})[0];
            items.push({driver_id:did,driver_name:drv?drv.name:'',center:center,date:date,type:map[k]});
          });
          if(!items.length){ if(toast)toast.info('No hay cambios que guardar'); return; }
          setSaving(true);
          apiPost('/shifts/bulk',{items:items}).then(function(j){
            setSaving(false);
            if(j&&j.success){ if(toast)toast.success('✅ '+j.saved+' turnos guardados'); setDirty({}); }
            else if(toast)toast.error('No se pudo guardar');
          }).catch(function(){ setSaving(false); if(toast)toast.error('Error guardando'); });
        }

        function resolve(id,action){
          apiPost('/shift-requests/'+id+'/resolve',{action:action}).then(function(j){
            if(j&&j.success){ if(toast)toast.success(action==='aprobar'?'Aprobada':'Rechazada'); load(); }
            else if(toast)toast.error('No se pudo procesar');
          });
        }

        function onImport(e){
          var f=e.target.files&&e.target.files[0]; e.target.value=''; if(!f) return;
          if(toast)toast.info('📥 Importando cuadrante…');
          var fd=new FormData(); fd.append('file',f); fd.append('center',center);
          fetch(API+'/shifts/import',{method:'POST',headers:{'Authorization':'Bearer '+tok()},body:fd})
            .then(function(r){return r.json();}).then(function(j){
              if(j&&j.success){ if(toast)toast.success('✅ '+j.saved+' turnos · '+j.dias+' días'+(j.unmatched&&j.unmatched.length?' · '+j.unmatched.length+' sin cruzar':'')); load(); }
              else if(toast)toast.error((j&&j.detail)||'No se pudo importar');
            }).catch(function(){ if(toast)toast.error('Error importando'); });
        }

        function saveMin(v){
          var n=parseInt(v,10); if(isNaN(n))return; setMinCob(n);
          apiPost('/shifts/settings',{center:center,min_cobertura:n}).then(function(){ if(toast)toast.info('Cobertura mínima: '+n); });
        }

        function setDem(date,field,val){
          var dm=Object.assign({},demand); dm[date]=Object.assign({},dm[date]||{}); dm[date][field]=val===''?null:parseInt(val,10); setDemand(dm);
        }
        function saveDemand(){
          var items=days.map(function(d){ var x=demand[d]||{}; return {date:d,objetivo:x.objetivo,maximo:x.maximo}; });
          apiPost('/route-demand',{center:center,items:items}).then(function(j){ if(j&&j.success&&toast)toast.info('Demanda guardada'); });
        }

        function generate(){
          var anyObj=days.some(function(d){ return demand[d]&&demand[d].objetivo; });
          if(!anyObj){ if(toast)toast.error('Pon las rutas objetivo de Amazon en al menos un día antes de generar'); return; }
          setGenerating(true); setGenResumen(''); saveDemand();
          /* partir el mes en semanas (acaban en domingo) → cada llamada pequeña = mejor calidad */
          var weeks=[], cur=[];
          days.forEach(function(d){ cur.push(d); if(dowLetter(d)==='D'){ weeks.push(cur); cur=[]; } });
          if(cur.length) weeks.push(cur);
          weeks=weeks.filter(function(w){ return w.some(function(d){ return demand[d]&&demand[d].objetivo; }); });
          if(!weeks.length){ setGenerating(false); if(toast)toast.error('Pon objetivos en alguna semana'); return; }
          var m=Object.assign({},map), dd=Object.assign({},dirty), res=[], i=0;
          function nextWeek(){
            if(i>=weeks.length){ setMap(m); setDirty(dd); setGenResumen(res.join('  ·  ')||'Propuesta generada.'); setGenerating(false); setShowGen(false); if(toast)toast.success('✨ Cuadrante propuesto · revísalo y guarda'); return; }
            var w=weeks[i]; setGenResumen('⏳ Generando semana '+(i+1)+' de '+weeks.length+'…');
            var ctrl=new AbortController(); var killer=setTimeout(function(){ ctrl.abort(); },180000);
            fetch(API+'/shifts/generate',{method:'POST',headers:{'Authorization':'Bearer '+tok(),'Content-Type':'application/json'},body:JSON.stringify({center:center,desde:w[0],hasta:w[w.length-1],prompt:genPrompt}),signal:ctrl.signal})
              .then(function(r){return r.json();}).then(function(j){
                clearTimeout(killer);
                if(j&&j.success){ (j.assignments||[]).forEach(function(a){ var k=a.driver_id+'|'+a.date; m[k]=a.type; dd[k]=1; }); if(j.resumen)res.push('S'+(i+1)+': '+j.resumen); }
                else if(toast)toast.error('Semana '+(i+1)+': '+((j&&j.detail)||'no se pudo'));
                i++; nextWeek();
              }).catch(function(err){ clearTimeout(killer); if(toast)toast.error('Semana '+(i+1)+(err&&err.name==='AbortError'?': tardó demasiado, reintenta':': error de red')); i++; nextWeek(); });
          }
          nextWeek();
        }

        function genAuto(){
          var anyObj=days.some(function(d){ return demand[d]&&demand[d].objetivo; });
          if(!anyObj){ if(toast)toast.error('Pon las rutas objetivo de Amazon antes de generar'); return; }
          setGenerating(true); setGenResumen('⚙️ Calculando cuadrante…'); saveDemand();
          apiPost('/shifts/generate-auto',{center:center,desde:desde,hasta:hasta}).then(function(j){
            setGenerating(false);
            if(j&&j.success){
              var m=Object.assign({},map), dd=Object.assign({},dirty);
              (j.assignments||[]).forEach(function(a){ var k=a.driver_id+'|'+a.date; m[k]=a.type; dd[k]=1; });
              setMap(m); setDirty(dd); setGenResumen('⚙️ '+(j.resumen||'Cuadrante generado.'));
              if(toast)toast.success('⚙️ Cuadrante automático listo · revísalo y guarda');
            } else if(toast)toast.error((j&&j.detail)||'No se pudo generar');
          }).catch(function(){ setGenerating(false); if(toast)toast.error('Error generando'); });
        }

        function downloadXls(){
          var L={trabaja:'T',libre:'L',extra:'E'};
          var head='<tr><th>Conductor</th><th>Contrato</th><th>Nivel</th>'+days.map(function(d){return '<th>'+dowLetter(d)+' '+pretty(d)+'</th>';}).join('')+'</tr>';
          var body=drivers.map(function(drv){
            var tds=days.map(function(d){ return '<td>'+(L[cellType(drv.id,d)]||'')+'</td>'; }).join('');
            return '<tr><td>'+(drv.name||'').toUpperCase()+'</td><td>'+(((drv.contrato||'ett')==='empresa')?'EMP':'ETT')+'</td><td>'+(drv.nivel||'pleno')+'</td>'+tds+'</tr>';
          }).join('');
          var dem='<tr><td>Rutas Amazon</td><td></td><td></td>'+days.map(function(d){var x=demand[d]||{};return '<td>'+(x.objetivo!=null?x.objetivo:'')+'</td>';}).join('')+'</tr>';
          var cov='<tr><td>Disponibles</td><td></td><td></td>'+days.map(function(d){return '<td>'+coverageOf(d)+'</td>';}).join('')+'</tr>';
          var html='<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1">'+head+dem+body+cov+'</table></body></html>';
          var blob=new Blob(['﻿'+html],{type:'application/vnd.ms-excel'});
          var url=URL.createObjectURL(blob); var a=document.createElement('a');
          a.href=url; a.download='Cuadrante_'+center+'_'+monthName(monStart).replace(/ /g,'_')+'.xls';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          setTimeout(function(){ URL.revokeObjectURL(url); },1500);
          if(toast)toast.success('📥 Cuadrante descargado');
        }

        function onScorecards(e){
          var arr=Array.prototype.slice.call(e.target.files||[]); e.target.value=''; if(!arr.length) return;
          setScProg(arr.map(function(f){ return {name:f.name, state:'proc', lines:0, crz:0, detail:''}; }));
          setScImporting(true);
          var done=0;
          arr.forEach(function(f,idx){
            var fd=new FormData(); fd.append('file',f); fd.append('center',center);
            fetch(API+'/scorecard/import',{method:'POST',headers:{'Authorization':'Bearer '+tok()},body:fd})
              .then(function(r){return r.json();}).then(function(j){
                setScProg(function(prev){ var c=prev.slice(); c[idx]=Object.assign({},c[idx],{
                  state:(j&&j.success)?'ok':'err', lines:(j&&j.conductores)||0, crz:(j&&j.cruzados)||0,
                  detail:(j&&j.detail)||'' }); return c; });
              }).catch(function(){
                setScProg(function(prev){ var c=prev.slice(); c[idx]=Object.assign({},c[idx],{state:'err',detail:'fallo de red'}); return c; });
              }).then(function(){
                done++; if(done===arr.length){ setScImporting(false); load(); }
              });
          });
        }

        function delWeek(sem){
          fetch(API+'/scorecard/week?center='+encodeURIComponent(center)+'&semana='+encodeURIComponent(sem),{method:'DELETE',headers:{'Authorization':'Bearer '+tok()}})
            .then(function(r){return r.json();}).then(function(){ if(toast)toast.info('Semana borrada'); load(); }).catch(function(){ if(toast)toast.error('No se pudo borrar'); });
        }

        function saveDriverMeta(did,contrato,nivel){
          var ds=drivers.map(function(x){ return x.id===did?Object.assign({},x,{contrato:contrato,nivel:nivel}):x; });
          setDrivers(ds); setEditDrv(null);
          fetch(API+'/drivers/'+did,{method:'PATCH',headers:{'Authorization':'Bearer '+tok(),'Content-Type':'application/json'},body:JSON.stringify({contrato:contrato,nivel:nivel})}).then(function(){ if(toast)toast.info('Conductor actualizado'); });
        }

        var btn=function(label,on,style){ return h('button',{onClick:on,style:Object.assign({padding:'8px 12px',borderRadius:'9px',cursor:'pointer',fontSize:'13px',fontWeight:700,border:'1px solid rgba(255,255,255,.12)',background:'rgba(255,255,255,.04)',color:'#cbd3e0'},style||{})},label); };

        return h('div',{style:{padding:'22px',maxWidth:'1040px',margin:'0 auto'}},
          /* cabecera */
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',marginBottom:'16px',flexWrap:'wrap'}},
            h('h1',{style:{margin:0,fontSize:'20px',fontWeight:800,color:'#f4f5f8'}},'🗓️ Cuadrante de turnos'),
            h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},
              !propCenter && h('select',{value:center,onChange:function(e){setCenter(e.target.value);},style:{padding:'8px',borderRadius:'9px',background:'#1a2030',color:'#cbd3e0',border:'1px solid rgba(255,255,255,.12)',fontSize:'13px'}},
                ['OGA5','DGA1','DGA2'].map(function(c){return h('option',{key:c,value:c},c);})),
              h('input',{ref:fileRef,type:'file',accept:'.xls,.xlsx',style:{display:'none'},onChange:onImport}),
              btn('📥 Importar Excel',function(){fileRef.current&&fileRef.current.click();}),
              h('input',{ref:scFileRef,type:'file',accept:'.pdf,.html,.htm,.xlsx,.csv',multiple:true,style:{display:'none'},onChange:onScorecards}),
              btn('📊 Scorecards',function(){scFileRef.current&&scFileRef.current.click();}),
              h('button',{onClick:genAuto,disabled:generating,title:'Algoritmo determinista: instantáneo y consistente',style:{padding:'8px 14px',borderRadius:'9px',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:800,background:'linear-gradient(135deg,#38bdf8,#0284c7)',color:'#fff',opacity:generating?.6:1}},'⚙️ Generar auto'),
              h('button',{onClick:function(){setShowGen(true);},style:{padding:'8px 14px',borderRadius:'9px',border:'1px solid rgba(167,139,250,.5)',cursor:'pointer',fontSize:'13px',fontWeight:700,background:'rgba(167,139,250,.12)',color:'#a78bfa'}},'✨ IA (ajuste)'),
              btn('📥 Descargar',downloadXls),
              h('button',{onClick:save,disabled:saving,style:{padding:'8px 16px',borderRadius:'9px',border:'none',cursor:'pointer',fontSize:'13px',fontWeight:800,background:'linear-gradient(135deg,#34d399,#059669)',color:'#fff',opacity:saving?.6:1}},saving?'⏳…':'💾 Guardar')
            )
          ),

          /* navegación de mes */
          h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px',flexWrap:'wrap'}},
            btn('‹ Mes',function(){setMon(addMonths(monStart,-1));}),
            h('div',{style:{fontSize:'14px',fontWeight:800,color:'#f4f5f8',minWidth:'150px',textAlign:'center'}}, monthName(monStart)),
            btn('Mes ›',function(){setMon(addMonths(monStart,1));}),
            btn('Hoy',function(){setMon(firstOfMonth(new Date()));},{fontWeight:600}),
            h('div',{style:{flex:1}}),
            h('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',color:'#8892a4'}},'Cobertura mín.',
              h('input',{type:'number',min:0,value:minCob,onChange:function(e){saveMin(e.target.value);},style:{width:'56px',padding:'5px',borderRadius:'7px',background:'#1a2030',color:'#cbd3e0',border:'1px solid rgba(255,255,255,.12)',fontSize:'12px'}}))
          ),

          /* solicitudes pendientes */
          reqs.length>0 && h('div',{style:{marginBottom:'16px',padding:'12px 14px',borderRadius:'12px',background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.25)'}},
            h('div',{style:{fontSize:'12px',fontWeight:700,color:'#60a5fa',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'.04em'}},'Solicitudes pendientes ('+reqs.length+')'),
            reqs.map(function(r){ return h('div',{key:r.id,style:{display:'flex',alignItems:'center',gap:'10px',padding:'6px 0',borderTop:'1px solid rgba(255,255,255,.06)'}},
              h('span',{style:{flex:1,fontSize:'13px',color:'#cbd3e0'}}, r.driver_name+' · '+(r.type==='extra'?'extra':'libre')+' el ',h('b',null,pretty(r.date))),
              r.note&&h('span',{style:{fontSize:'11px',color:'#8892a4',fontStyle:'italic'}},'“'+r.note+'”'),
              h('button',{onClick:function(){resolve(r.id,'aprobar');},style:{padding:'5px 10px',borderRadius:'7px',border:'none',cursor:'pointer',fontSize:'12px',fontWeight:700,background:'rgba(34,197,94,.18)',color:'#22c55e'}},'✓ Aprobar'),
              h('button',{onClick:function(){resolve(r.id,'rechazar');},style:{padding:'5px 10px',borderRadius:'7px',border:'none',cursor:'pointer',fontSize:'12px',fontWeight:700,background:'rgba(239,68,68,.16)',color:'#ef4444'}},'✕')
            ); })
          ),

          genResumen && h('div',{style:{marginBottom:'12px',padding:'12px 14px',borderRadius:'12px',background:'rgba(167,139,250,.1)',border:'1px solid rgba(167,139,250,.3)',fontSize:'13px',color:'#cbd3e0',lineHeight:1.5}},
            h('b',{style:{color:'#a78bfa'}},'Propuesta: '),genResumen,
            h('div',{style:{color:'#8892a4',fontSize:'11.5px',marginTop:'4px'}},'Revisa las celdas en azul y pulsa 💾 Guardar para confirmar.')),

          scProg.length>0 && h('div',{style:{marginBottom:'12px',padding:'12px 14px',borderRadius:'12px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.1)'}},
            h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}},
              h('span',{style:{fontSize:'12.5px',fontWeight:700,color:'#cbd3e0'}},
                scImporting?('⏳ Importando… '+scProg.filter(function(p){return p.state!=='proc';}).length+'/'+scProg.length+' (la IA tarda ~10-60s por archivo)'):'📊 Importación terminada'),
              !scImporting && h('button',{onClick:function(){setScProg([]);},style:{padding:'3px 9px',borderRadius:'7px',border:'1px solid rgba(255,255,255,.12)',background:'rgba(255,255,255,.04)',color:'#8892a4',fontSize:'11px',cursor:'pointer'}},'Ocultar')
            ),
            scProg.map(function(p,i){ return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:'8px',fontSize:'12.5px',padding:'4px 0',borderTop:i?'1px solid rgba(255,255,255,.05)':'none'}},
              h('span',{style:{width:'16px'}}, p.state==='proc'?'⏳':p.state==='ok'?'✅':'❌'),

                    h('div',{style:{fontWeight:700,color:we?'#8892a4':'#cbd3e0'}},dowLetter(d)),

                ),

                  days.map(function(d){ var x=demand[d]||{}; var we=isWeekend(d); return h('th',{key:d,style:{padding:'2px',textAlign:'center',background:we?'rgba(255,255,255,.02)':'transparent'}},

              h('h2',{style:{margin:'0 0 6px',fontSize:'17px',fontWeight:800,color:'#f4f5f8'}},'✨ Generar cuadrante con IA'),
              h('p',{style:{margin:'0 0 12px',fontSize:'12.5px',color:'#8892a4',lineHeight:1.5}},'Genera el mes semana a semana usando el ritmo real, los días ya trabajados y las rutas objetivo de Amazon. Empresa solo L–V; novatos L1/L2/L3 con carga progresiva (protegidos aparte). Escribe tus reglas:'),
              h('textarea',{value:genPrompt,onChange:function(e){setGenPrompt(e.target.value);},rows:5,disabled:generating,style:{width:'100%',boxSizing:'border-box',padding:'10px',borderRadius:'10px',background:'#1a2030',color:'#e3e8f0',border:'1px solid rgba(255,255,255,.12)',fontSize:'13px',resize:'vertical'}}),
              generating&&h('div',{style:{marginTop:'10px',fontSize:'12.5px',color:'#a78bfa',fontWeight:700}}, (genResumen||'⏳ Generando…')+' ('+genElapsed+'s) — no cierres esta ventana'),
              h('div',{style:{display:'flex',gap:'8px',justifyContent:'flex-end',marginTop:'14px'}},
                btn(generating?'Cerrar (sigue en 2º plano)':'Cancelar',function(){setShowGen(false);}),

  <!-- FlotaDSP — Scorecard EN VIVO: semana dom-sáb, datos diarios de Cortex por centro -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function apiGet(p){ return fetch(API+p,{headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiPost(p,b){ return fetch(API+p,{method:"POST",headers:{"Authorization":"Bearer "+tok(),"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){return r.json();}); }
    function waitReact(cb){ var t=setInterval(function(){ if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);} },120); }
    function diaCorto(iso){ try{var p=iso.split('-');return p[2]+'/'+p[1];}catch(e){return iso;} }

    waitReact(function(React){
      var h = React.createElement;

      // Explicación amable de cada motivo de POD para coaching
      var POD_TIP = {
        'No package detected':'La foto no muestra el paquete — hay que enfocar el bulto, no solo la puerta.',
        'Photo too dark':'Foto demasiado oscura — usar el flash o más luz.',
        'Photo too blurry':'Foto movida — sujetar firme antes de disparar.',
        'Package in car':'Se ve el paquete dentro del coche — sacarlo y dejarlo en el punto de entrega.',
        'Package too close':'Demasiado cerca — alejarse para que se vea el entorno.'
      };

      window.__FlotaScorecardLive = function(props){
        var toast=props.toast;
        var propCenter=(props.center && props.center!=='Todos')?props.center:null;
        var cS=React.useState(propCenter||'OGA5'),center=cS[0],setCenter=cS[1];
        React.useEffect(function(){ if(propCenter) setCenter(propCenter); },[props.center]);
        var wS=React.useState(null),week=wS[0],setWeek=wS[1];
        var fS=React.useState(null),full=fS[0],setFull=fS[1];
        var dS=React.useState(null),daily=dS[0],setDaily=dS[1];
        var lS=React.useState(true),loading=lS[0],setLoading=lS[1];
        var uS=React.useState(false),uploading=uS[0],setUploading=uS[1];
        var edS=React.useState(null),editKey=edS[0],setEditKey=edS[1];
        var drS=React.useState(null),drill=drS[0],setDrill=drS[1];
        var qS=React.useState([]),queue=qS[0],setQueue=qS[1];
        var prS=React.useState(null),predict=prS[0],setPredict=prS[1];
        var srcS=React.useState(null),sources=srcS[0],setSources=srcS[1];
        var trS=React.useState(null),trend=trS[0],setTrend=trS[1];
        var fileRef=React.useRef(null);

        function loadPredict(){
          apiGet('/scorecard/predict?center='+encodeURIComponent(center)).then(function(j){ setPredict(j||null); }).catch(function(){});
        }
        function loadSources(wk){
          apiGet('/scorecard/sources?center='+encodeURIComponent(center)+((wk||week)?('&week='+(wk||week)):'')).then(function(j){ setSources(j||null); }).catch(function(){});
        }
        function loadTrend(wk){
          apiGet('/scorecard/daily-trend?center='+encodeURIComponent(center)+((wk||week)?('&week='+(wk||week)):'')).then(function(j){ setTrend(j||null); }).catch(function(){});
        }
        function toggleEstimacion(){
          var on=!(full&&full.estimacion_on);
          fetch(API+'/scorecard/estimacion',{method:'POST',headers:{'Authorization':'Bearer '+tok(),'Content-Type':'application/json'},body:JSON.stringify({center:center,week:week,on:on})})
            .then(function(r){return r.json();})
            .then(function(){ if(toast)toast.success(on?'Estimando lo que falta':'Solo datos reales'); loadAll(week); })
            .catch(function(){ if(toast)toast.error('No se pudo cambiar'); });
        }
        function resetWeek(){
          if(!window.confirm('¿Poner esta semana a CERO?\n\nSe borran: reportes diarios, Descripción general, valores a mano y la scorecard de esta semana. Se desactiva la estimación de semanas anteriores.\n\nLa nota se calculará SOLO con lo que subas o edites a partir de ahora.')) return;
          fetch(API+'/scorecard/reset',{method:'POST',headers:{'Authorization':'Bearer '+tok(),'Content-Type':'application/json'},body:JSON.stringify({center:center,week:week})})
            .then(function(r){return r.json();})
            .then(function(){ if(toast)toast.success('Semana reseteada · sube tus archivos'); loadAll(week); loadPredict(); loadSources(week); })
            .catch(function(){ if(toast)toast.error('No se pudo resetear'); });
        }
        function deleteSource(it){
          var q='/scorecard/source?center='+encodeURIComponent(center)+'&kind='+encodeURIComponent(it.kind)+'&ref='+encodeURIComponent(it.ref)+(week?('&week='+week):'');
          fetch(API+q,{method:'DELETE',headers:{'Authorization':'Bearer '+tok()}})
            .then(function(r){return r.json();})
            .then(function(){ if(toast)toast.success('Eliminado · recalculando…'); loadAll(week); loadPredict(); loadSources(week); })
            .catch(function(){ if(toast)toast.error('No se pudo borrar'); });
        }

        // ── Cola de subida UNIFICADA (PDF/HTML/XLSX/XLS/CSV) — máx 3 a la vez, ×3 reintentos ──
        function uploadFiles(fileList){
          var files=Array.prototype.slice.call(fileList||[]);
          console.log('[scupload] uploadFiles recibe:', files.length, 'archivo(s)');
          if(!files.length){ console.warn('[scupload] 0 archivos → no se sube'); return; }
          var items=files.map(function(f){ return {name:f.name,size:f.size,status:'Esperando',pct:0,msg:'',tipo:'',file:f}; });
          setQueue(items); setUploading(true);
          var idx=0, active=0, fin=0, lastSc=null;
          function upd(i,patch){ setQueue(function(prev){ var c=prev.slice(); c[i]=Object.assign({},c[i],patch); return c; }); }
          function done(i){ active--; fin++; if(fin===items.length){ setUploading(false); if(lastSc&&lastSc.week){ var s=new Date(2026,4,31); s.setDate(s.getDate()+(lastSc.week-23)*7); loadAll(s.getFullYear()+'-'+String(s.getMonth()+1).padStart(2,'0')+'-'+String(s.getDate()).padStart(2,'0')); } else loadAll(week); loadPredict(); if(toast)toast.success('Subida terminada'); } else pump(); }
          function one(i,attempt){
            var it=items[i]; upd(i,{status:'Subiendo',pct:15});
            var fd=new FormData(); fd.append('file',it.file); fd.append('center',center);
            var ctrl=new AbortController(); var killer=setTimeout(function(){ctrl.abort();},120000);
            setTimeout(function(){ upd(i,{status:'Procesando',pct:55}); },300);
            fetch(API+'/scorecard/upload',{method:'POST',headers:{'Authorization':'Bearer '+tok()},body:fd,signal:ctrl.signal})
              .then(function(r){ return r.json().then(function(j){ return {ok:r.ok,j:j}; }); })
              .then(function(res){ clearTimeout(killer);
                if(res.ok && res.j && res.j.ok){ upd(i,{status:'Completado',pct:100,msg:res.j.mensaje||'',tipo:res.j.tipo||''}); if(res.j.tipo==='scorecard'){ var mw=(res.j.mensaje||'').match(/W(\d+)/); if(mw)lastSc={week:+mw[1]}; } done(i); }
                else { throw new Error((res.j&&res.j.detail)||'no se pudo procesar'); }
              }).catch(function(e){ clearTimeout(killer);
                if(attempt<3){ upd(i,{status:'Reintentando '+(attempt+1)+'/3',pct:25}); setTimeout(function(){ one(i,attempt+1); },800); }
                else { upd(i,{status:'Error',pct:100,msg:(e&&e.message)||'falló'}); done(i); }
              });
          }
          function pump(){ while(active<3 && idx<items.length){ var i=idx++; active++; one(i,1); } }
          pump();
        }
        function onPick(e){ var f=Array.prototype.slice.call(e.target.files||[]); console.log('[scupload] onPick archivos:', f.length, f.map(function(x){return x.name;})); e.target.value=''; uploadFiles(f); }

        function loadAll(wk){
          setLoading(true);
          apiGet('/scorecard/full?center='+encodeURIComponent(center)+(wk?('&week='+wk):'')).then(function(j){
            setFull(j); setWeek(j.week);
            return apiGet('/metrics/daily-week?center='+encodeURIComponent(center)+'&desde='+j.desde+'&hasta='+j.hasta);
          }).then(function(dw){ setDaily(dw||{}); setLoading(false); }).catch(function(){ setLoading(false); if(toast)toast.error('Error cargando'); });
          loadSources(wk); loadTrend(wk);
        }
        React.useEffect(function(){ loadAll(null); loadPredict(); },[center]);

        function navWeek(delta){
          if(!week) return;
          var p=week.split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+delta*7);
          loadAll(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
        }
        function saveValue(key,val){
          apiPost('/scorecard/full',{center:center,week:week,key:key,value:val}).then(function(){ setEditKey(null); loadAll(week); });
        }
        function onFile(e){
          var fl=Array.prototype.slice.call(e.target.files||[]); e.target.value=''; if(!fl.length) return;
          setUploading(true); if(toast)toast.info('⬆️ Subiendo '+fl.length+' reporte(s)…');
          var done=0,ok=0;
          fl.forEach(function(f){ var fd=new FormData(); fd.append('file',f);
            fetch(API+'/metrics/upload-daily',{method:'POST',headers:{'Authorization':'Bearer '+tok()},body:fd})
              .then(function(r){return r.json();}).then(function(j){ if(j&&j.success)ok++; }).catch(function(){})
              .then(function(){ done++; if(done===fl.length){ setUploading(false); if(toast)toast.success('✅ '+ok+'/'+fl.length+' procesados'); loadAll(week); } });
          });
        }
        function diaCorto(iso){ try{var p=iso.split('-');return p[2]+'/'+p[1];}catch(e){return iso;} }
        function tierColor(t){ return t==='Fantastic'?'#0ea5e9':t==='Great'?'#22c55e':t==='Fair'?'#f59e0b':t==='Poor'?'#ef4444':'#5c6578'; }
        function fmtVal(m){ if(m.value==null) return '—'; return m.value+(m.unit==='%'?'%':''); }
        function drillRows(m){
          var rk=(daily&&daily.ranking)||[]; var f=m.drill;
          if(f==='pod') return rk.filter(function(d){return d.pod>0;}).sort(function(a,b){return b.pod-a.pod;});
          if(f==='dnr') return rk.filter(function(d){return d.dnr>0;}).sort(function(a,b){return b.dnr-a.dnr;});
          if(f==='cc') return rk.filter(function(d){return d.cc>0;}).sort(function(a,b){return b.cc-a.cc;});
          if(f==='all') return rk.filter(function(d){return (d.pod+d.dnr+d.rts+d.cc)>0;}).sort(function(a,b){return (b.pod+b.dnr+b.rts+b.cc)-(a.pod+a.dnr+a.rts+a.cc);});
          return [];
        }

        function metricCard(m){
          var col=tierColor(m.tier); var clickable=!!m.drill;
          return h('div',{key:m.key,onClick:clickable&&editKey!==m.key?function(){setDrill(m);}:null,
            style:{flex:'1 1 230px',minWidth:'205px',padding:'12px 14px',borderRadius:'12px',background:'rgba(255,255,255,.03)',border:'1px solid '+(m.tier?(col+'55'):'rgba(255,255,255,.08)'),cursor:(clickable&&editKey!==m.key)?'pointer':'default'}},
            h('div',{style:{fontSize:'11.5px',color:'#8892a4',marginBottom:'5px'}}, m.label, clickable&&h('span',{style:{color:'#60a5fa',marginLeft:'6px'}},'🔍')),
            h('div',{style:{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'8px'}},
              h('span',{style:{fontSize:'15px',fontWeight:800,color:col}}, m.tier||'sin datos'),
              editKey===m.key

  <!-- ===== CANDADOS MULTI-TENANT: oculta módulos no comerciales a cuentas DSP ===== -->
  <script>
  (function(){
    function accountType(){
      try{ var a=JSON.parse(localStorage.getItem('flotadsp_admin')||'{}'); if(a && a.account_type) return a.account_type; }catch(e){}
      try{ var p=JSON.parse(atob((localStorage.getItem('flotadsp_token')||'').split('.')[1]||'')); return p && p.account_type; }catch(e){}
      return null;
    }
    function getHidden(){
      // Un DSP comercial siempre oculta estos; el dueño no oculta nada.
      if(accountType()==='dsp') return ['ia-peritaje','scorecard','turnos'];
      try{ var a=JSON.parse(localStorage.getItem('flotadsp_admin')||'{}'); if(a && a.hidden_modules && a.hidden_modules.length) return a.hidden_modules; }catch(e){}
      return [];
    }
    var hidden=getHidden();
    if(!hidden.length) return; // dueño (tú) lo ve todo

    var PATHS=[], LABELS=[];
    if(hidden.indexOf('ia-peritaje')>=0){ PATHS.push('/ia-peritaje'); LABELS.push('IA Peritaje'); }
    if(hidden.indexOf('scorecard')>=0){ PATHS.push('/scorecard','/scorecard-live');
      LABELS.push('Scorecard','Scorecard en vivo','Scorecard Amazon'); }
    if(hidden.indexOf('turnos')>=0){ PATHS.push('/turnos');
      LABELS.push('Cuadrante turnos','Cuadrante de turnos'); }

    function hideRow(el){ var r=el.closest('a,li,button')||el; if(r){ r.style.display='none'; r.setAttribute('data-locked','1'); } }
    function sweep(){
      var scopes=document.querySelectorAll('[class*="sidebar"],[class*="Sidebar"],nav,aside');
      scopes.forEach(function(scope){
        scope.querySelectorAll('a[href]').forEach(function(a){
          var h=a.getAttribute('href')||'';
          if(PATHS.some(function(p){return h===p||h==='#'+p||h.endsWith(p);})) hideRow(a);
        });
        scope.querySelectorAll('a,button,li').forEach(function(el){
          if(el.getAttribute('data-locked')) return;
          if(el.querySelectorAll('a,button,li').length>0) return; // solo el item hoja
          var t=(el.textContent||'').replace(/\s+/g,' ').trim();
          if(LABELS.indexOf(t)>=0) hideRow(el);
        });
      });
    }
    var raf=null;
    function schedule(){ if(raf) return; raf=requestAnimationFrame(function(){ raf=null; sweep(); }); }
    function start(){ sweep(); new MutationObserver(schedule).observe(document.body,{childList:true,subtree:true}); }
    if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start); else start();
  })();
  </script>

  <script>
  (function(){
    function isSuper(){
      try{ var p=JSON.parse(atob((localStorage.getItem('flotadsp_token')||'').split('.')[1]||'')); return !!(p && p.sa); }catch(e){}
      return false;
    }
    function add(){
      if(!isSuper() || document.getElementById('sa-fab')) return;
