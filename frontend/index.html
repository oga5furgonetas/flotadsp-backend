  <!-- ═══════════════════════════════════════════════════════
       FlotaDSP v5.3 — Premium UI Enhancement Layer
       ═══════════════════════════════════════════════════════ -->
  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root {
      /* Surfaces — deep navy-black stack */
      --s0: #07080c;
      --s1: #0d0f14;
      --s2: #111318;
      --s3: #16181f;
      --s4: #1c1f28;
      --s5: #222631;
      --s6: #282d3a;

      /* Accent — FlotaDSP orange */
      --accent:        #f97316;
      --accent-light:  #fb923c;
      --accent-dark:   #ea6800;
      --accent-muted:  rgba(249,115,22,.12);
      --accent-glow:   rgba(249,115,22,.22);

      /* Text */
      --tx0: #f4f5f8;
      --tx1: #c8ccd6;
      --tx2: #8892a4;
      --tx3: #4d5568;

      /* Border */
      --b0: rgba(255,255,255,.04);
      --b1: rgba(255,255,255,.07);
      --b2: rgba(255,255,255,.11);
      --b3: rgba(255,255,255,.18);

      /* Semantic */
      --green:  #22c55e;
      --yellow: #f59e0b;
      --red:    #ef4444;
      --blue:   #3b82f6;
      --purple: #a855f7;
      --teal:   #14b8a6;

      /* Geometry */
      --r-xs: 6px;
      --r-sm: 9px;
      --r-md: 13px;
      --r-lg: 18px;
      --r-xl: 24px;
      --r-2xl:32px;

      /* Shadows */
      --sh-sm:  0 1px 4px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.25);
      --sh-md:  0 4px 16px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.30);
      --sh-lg:  0 8px 32px rgba(0,0,0,.55), 0 3px 10px rgba(0,0,0,.35);
      --sh-xl:  0 20px 60px rgba(0,0,0,.65), 0 6px 20px rgba(0,0,0,.40);
      --sh-orange: 0 4px 20px rgba(249,115,22,.35);

      /* Motion */
      --ease: cubic-bezier(.4,0,.2,1);
      --fast: .14s;
      --base: .2s;
      --slow: .35s;
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; color-scheme: dark; }

    body {
      margin: 0;
      background: var(--s0) !important;
      color: var(--tx0) !important;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      font-size: 14px;
      line-height: 1.55;
      font-feature-settings: "cv02","cv03","cv04","cv11","ss01";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -.01em;
    }

    #root {
      animation: pageIn .25s var(--ease) both;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Custom scrollbar ──────────────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--s6) transparent; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--s6);
      border-radius: 99px;
      transition: background var(--base);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--s5); }

    /* ── Selection ─────────────────────────────────────────── */
    ::selection { background: rgba(249,115,22,.3); color: #fff; }

    /* ── Typography helpers ────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      color: var(--tx0) !important;
      letter-spacing: -.02em !important;
      font-weight: 700 !important;
    }
    p, span { color: inherit; }
    small, [class*="muted"], [class*="secondary"] {
      color: var(--tx2) !important;
    }

    /* ── Sidebar / Navigation ──────────────────────────────── */
    nav, aside,
    [class*="sidebar"], [class*="Sidebar"],
    [class*="nav-"], [class*="-nav"] {
      background: var(--s1) !important;
      border-right: 1px solid var(--b1) !important;
    }

    /* Nav items */
    nav a, nav button,
    [class*="nav-item"], [class*="NavItem"],
    [class*="menu-item"], [class*="MenuItem"] {
      border-radius: var(--r-sm) !important;
      color: var(--tx1) !important;
      transition: background var(--fast) var(--ease), color var(--fast) var(--ease) !important;
    }
    nav a:hover, nav button:hover,
    [class*="nav-item"]:hover {
      background: var(--s4) !important;
      color: var(--tx0) !important;
    }
    /* Active nav item */
    nav a[class*="active"], nav [class*="active"],
    [class*="nav-item"][class*="active"] {
      background: var(--accent-muted) !important;
      color: var(--accent-light) !important;
      font-weight: 600 !important;
    }

    /* ── Header / Topbar ───────────────────────────────────── */
    header,
    [class*="header"], [class*="Header"],
    [class*="topbar"], [class*="Topbar"],
    [class*="toolbar"], [class*="Toolbar"] {
      background: rgba(13,15,20,.88) !important;
      border-bottom: 1px solid var(--b1) !important;
      backdrop-filter: blur(18px) saturate(180%) !important;
      -webkit-backdrop-filter: blur(18px) saturate(180%) !important;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    [class*="card"], [class*="Card"],
    [class*="panel"], [class*="Panel"],
    [class*="box"], [class*="Box"],
    .card, .panel {
      background: var(--s3) !important;
      border: 1px solid var(--b1) !important;
      border-radius: var(--r-lg) !important;
      box-shadow: var(--sh-md) !important;
      transition: box-shadow var(--base) var(--ease),
                  border-color var(--base) var(--ease),
                  transform var(--base) var(--ease) !important;
    }
    [class*="card"]:hover, [class*="Card"]:hover,
    [class*="panel"]:hover {
      box-shadow: var(--sh-lg) !important;
      border-color: var(--b2) !important;
    }

    /* Stat / KPI cards */
    [class*="stat"], [class*="Stat"],
    [class*="metric"], [class*="Metric"],
    [class*="kpi"], [class*="Kpi"] {
      background: var(--s3) !important;
      border: 1px solid var(--b1) !important;
      border-radius: var(--r-lg) !important;
      box-shadow: var(--sh-md) !important;
      position: relative !important;
      overflow: hidden !important;
    }
    /* Accent top border on stat cards */
    [class*="stat"]::before, [class*="Stat"]::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    /* ── Buttons ───────────────────────────────────────────── */
    button, [role="button"] {
      border-radius: var(--r-sm) !important;
      font-family: inherit !important;
      font-weight: 500 !important;
      font-size: .85rem !important;
      letter-spacing: -.005em !important;
      cursor: pointer !important;
      transition: background var(--fast) var(--ease),
                  box-shadow var(--fast) var(--ease),
                  opacity var(--fast) var(--ease),
                  transform var(--fast) var(--ease) !important;
    }
    button:hover { opacity: .92 !important; }
    button:active { transform: translateY(1px) scale(.99) !important; }

    /* Primary orange */
    button[class*="primary"], button[class*="Primary"],
    button[class*="orange"], [class*="btn-primary"] {
      background: linear-gradient(135deg, var(--accent-light), var(--accent-dark)) !important;
      color: #fff !important;
      box-shadow: var(--sh-orange) !important;
      border: none !important;
      font-weight: 600 !important;
    }
    button[class*="primary"]:hover {
      box-shadow: 0 6px 24px rgba(249,115,22,.45) !important;
    }

    /* Secondary / ghost */
    button[class*="secondary"], button[class*="Secondary"],
    button[class*="outline"], button[class*="ghost"] {
      background: var(--s5) !important;
      border: 1px solid var(--b2) !important;
      color: var(--tx1) !important;
    }
    button[class*="secondary"]:hover {
      background: var(--s6) !important;
      border-color: var(--b3) !important;
    }

    /* Danger */
    button[class*="danger"], button[class*="Danger"],
    button[class*="destructive"] {
      background: rgba(239,68,68,.15) !important;
      border: 1px solid rgba(239,68,68,.3) !important;
      color: #fca5a5 !important;
    }
    button[class*="danger"]:hover {
      background: rgba(239,68,68,.25) !important;
    }

    /* ── Inputs / Selects / Textareas ──────────────────────── */
    input:not([type="checkbox"]):not([type="radio"]),
    select, textarea {
      background: var(--s4) !important;
      border: 1px solid var(--b2) !important;
      border-radius: var(--r-sm) !important;
      color: var(--tx0) !important;
      font-family: inherit !important;
      font-size: .875rem !important;
      transition: border-color var(--fast) var(--ease),
                  box-shadow var(--fast) var(--ease),
                  background var(--fast) var(--ease) !important;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(249,115,22,.18) !important;
      outline: none !important;
      background: var(--s5) !important;
    }
    input::placeholder, textarea::placeholder {
      color: var(--tx3) !important;
    }
    select option {
      background: var(--s4) !important;
      color: var(--tx0) !important;
    }

    /* ── Tables ────────────────────────────────────────────── */
    table {
      border-collapse: separate !important;
      border-spacing: 0 2px !important;
      width: 100% !important;
    }
    thead { position: sticky; top: 0; z-index: 10; }
    thead tr { background: var(--s2) !important; }
    thead th {
      background: var(--s2) !important;
      color: var(--tx3) !important;
      font-size: .70rem !important;
      font-weight: 700 !important;
      letter-spacing: .06em !important;
      text-transform: uppercase !important;
      padding: 10px 14px !important;
      border-bottom: 1px solid var(--b2) !important;
      white-space: nowrap !important;
    }
    tbody tr {
      background: var(--s3) !important;
      border-bottom: 1px solid var(--b0) !important;
      transition: background var(--fast) var(--ease) !important;
    }
    tbody tr:hover {
      background: var(--s4) !important;
      cursor: pointer;
    }
    tbody td {
      padding: 9px 14px !important;
      font-size: .845rem !important;
      color: var(--tx1) !important;
      vertical-align: middle !important;
    }
    /* First column */
    tbody td:first-child { color: var(--tx0) !important; font-weight: 500 !important; }

    /* ── Badges / Pills / Tags ─────────────────────────────── */
    [class*="badge"], [class*="Badge"],
    [class*="chip"], [class*="Chip"],
    [class*="tag"], [class*="Tag"],
    [class*="pill"], [class*="Pill"],
    [class*="status"], [class*="Status"] {
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
      border-radius: 99px !important;
      font-size: .68rem !important;
      font-weight: 700 !important;
      letter-spacing: .04em !important;
      text-transform: uppercase !important;
      padding: 3px 10px !important;
      line-height: 1.4 !important;
    }

    /* ── Severity colors ────────────────────────────────────── */
    [data-severity="critico"],  [class*="critico"]  { color: var(--red) !important; }
    [data-severity="grave"],    [class*="grave"]    { color: var(--yellow) !important; }
    [data-severity="moderado"], [class*="moderado"] { color: #fb923c !important; }
    [data-severity="leve"],     [class*="leve"]     { color: var(--green) !important; }
    [data-severity="sin_danos"],[class*="sin_danos"]{ color: var(--tx2) !important; }

    /* ── Modals / Dialogs ──────────────────────────────────── */
    [role="dialog"],
    [class*="modal"], [class*="Modal"],
    [class*="dialog"], [class*="Dialog"],
    [class*="sheet"], [class*="Sheet"],
    [class*="drawer"], [class*="Drawer"] {
      background: var(--s3) !important;
      border: 1px solid var(--b2) !important;
      border-radius: var(--r-xl) !important;
      box-shadow: var(--sh-xl) !important;
    }

    /* Overlay */
    [class*="overlay"], [class*="Overlay"],
    [class*="backdrop"], [class*="Backdrop"],
    [class*="scrim"] {
      background: rgba(0,0,0,.72) !important;
      backdrop-filter: blur(6px) !important;
      -webkit-backdrop-filter: blur(6px) !important;
    }

    /* ── Dropdowns / Popovers ──────────────────────────────── */
    [role="menu"], [role="listbox"],
    [class*="dropdown"], [class*="Dropdown"],
    [class*="popover"], [class*="Popover"],
    [class*="select__menu"], [class*="combobox"] {
      background: var(--s4) !important;
      border: 1px solid var(--b2) !important;
      border-radius: var(--r-md) !important;
      box-shadow: var(--sh-xl) !important;
      backdrop-filter: blur(12px) !important;
    }
    [role="menuitem"], [role="option"],
    [class*="dropdown-item"], [class*="DropdownItem"] {
      border-radius: var(--r-xs) !important;
      font-size: .85rem !important;
      color: var(--tx1) !important;
      transition: background var(--fast) var(--ease), color var(--fast) var(--ease) !important;
    }
    [role="menuitem"]:hover, [role="option"]:hover {
      background: var(--s6) !important;
      color: var(--tx0) !important;
    }

    /* ── Tabs ──────────────────────────────────────────────── */
    [role="tablist"] {
      background: var(--s2) !important;
      border-radius: var(--r-md) !important;
      padding: 4px !important;
      gap: 2px !important;
      border: 1px solid var(--b1) !important;
    }
    [role="tab"] {
      border-radius: calc(var(--r-md) - 4px) !important;
      font-size: .82rem !important;
      font-weight: 500 !important;
      color: var(--tx2) !important;
      padding: 6px 14px !important;
      transition: all var(--fast) var(--ease) !important;
    }
    [role="tab"][aria-selected="true"] {
      background: var(--s5) !important;
      color: var(--tx0) !important;
      font-weight: 600 !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.3) !important;
    }
    [role="tab"]:hover:not([aria-selected="true"]) {
      background: var(--s4) !important;
      color: var(--tx1) !important;
    }

    /* ── Progress bars ─────────────────────────────────────── */
    [role="progressbar"] {
      background: var(--s5) !important;
      border-radius: 99px !important;
      overflow: hidden !important;
    }
    [role="progressbar"] > * {
      border-radius: 99px !important;
      background: linear-gradient(90deg, var(--accent-dark), var(--accent-light)) !important;
      transition: width .4s var(--ease) !important;
    }

    /* ── Toasts / Alerts ───────────────────────────────────── */
    [role="alert"],
    [class*="toast"], [class*="Toast"],
    [class*="alert"], [class*="Alert"],
    [class*="notification"], [class*="Notification"] {
      background: var(--s4) !important;
      border: 1px solid var(--b2) !important;
      border-radius: var(--r-md) !important;
      box-shadow: var(--sh-lg) !important;
      backdrop-filter: blur(12px) !important;
    }

    /* ── Skeleton loaders ──────────────────────────────────── */
    [class*="skeleton"], [class*="Skeleton"],
    [class*="loading-placeholder"], [class*="shimmer"] {
      background: linear-gradient(
        90deg,
        var(--s3) 25%,
        var(--s5) 50%,
        var(--s3) 75%
      ) !important;
      background-size: 300% 100% !important;
      animation: shimmer 1.6s infinite !important;
      border-radius: var(--r-sm) !important;
    }
    @keyframes shimmer {
      0%   { background-position: 150% 0; }
      100% { background-position: -150% 0; }
    }

    /* ── Dividers / Separators ─────────────────────────────── */
    hr, [role="separator"],
    [class*="divider"], [class*="Divider"],
    [class*="separator"], [class*="Separator"] {
      border: none !important;
      border-top: 1px solid var(--b1) !important;
    }

    /* ── Workshop cards ────────────────────────────────────── */
    [class*="workshop"], [class*="Workshop"] {
      background: var(--s3) !important;
      border: 1px solid var(--b1) !important;
      border-left: 3px solid var(--accent) !important;
      border-radius: var(--r-md) !important;
      transition: border-color var(--fast), box-shadow var(--fast) !important;
    }
    [class*="workshop"]:hover {
      border-left-color: var(--accent-light) !important;
      box-shadow: var(--sh-md) !important;
    }

    /* ── Provider brand accent lines ───────────────────────── */
    [data-provider="BANSACAR"]  { border-left-color: #EC0000 !important; }
    [data-provider="VAYVANS"]   { border-left-color: #0080C8 !important; }
    [data-provider="AYVENS"]    { border-left-color: #7B61FF !important; }
    [data-provider="LEASE PLAN"]{ border-left-color: #7B61FF !important; }
    [data-provider="KINTO"]     { border-left-color: #EB0A1E !important; }

    /* ── Marketplace search links ──────────────────────────── */
    a[href*="amazon.es"],
    a[href*="autodoc.es"],
    a[href*="recambioscoche.es"],
    a[href*="ebay.es"],
    a[href*="wallapop.com"],
    a[href*="desguacesonline.com"],
    a[href*="google.com/search?tbm=shop"],
    a[href*="google.es/search?tbm=shop"] {
      display: inline-flex !important;
      align-items: center !important;
      gap: 8px !important;
      padding: 8px 14px !important;
      background: var(--s4) !important;
      border: 1px solid var(--b2) !important;
      border-radius: var(--r-sm) !important;
      font-size: .82rem !important;
      font-weight: 600 !important;
      color: var(--tx1) !important;
      text-decoration: none !important;
      transition: all var(--fast) var(--ease) !important;
      white-space: nowrap !important;
    }
    a[href*="amazon.es"]:hover,
    a[href*="autodoc.es"]:hover,
    a[href*="recambioscoche.es"]:hover,
    a[href*="ebay.es"]:hover,
    a[href*="wallapop.com"]:hover,
    a[href*="desguacesonline.com"]:hover,
    a[href*="google.com/search?tbm=shop"]:hover,
    a[href*="google.es/search?tbm=shop"]:hover {
      background: var(--s6) !important;
      border-color: var(--accent) !important;
      color: var(--accent-light) !important;
      box-shadow: 0 0 0 2px var(--accent-muted) !important;
      transform: translateY(-1px) !important;
    }

    /* ── Map / location embeds ─────────────────────────────── */
    iframe {
      border: 1px solid var(--b1) !important;
      border-radius: var(--r-md) !important;
    }

    /* ── Form labels ───────────────────────────────────────── */
    label {
      color: var(--tx2) !important;
      font-size: .78rem !important;
      font-weight: 600 !important;
      letter-spacing: .03em !important;
    }

    /* ── Checkboxes & Radios ───────────────────────────────── */
    input[type="checkbox"], input[type="radio"] {
      accent-color: var(--accent) !important;
      width: 16px !important;
      height: 16px !important;
    }

    /* ── Switch / Toggle ───────────────────────────────────── */
    [role="switch"][aria-checked="true"],
    [class*="switch"][class*="checked"],
    [class*="toggle"][class*="on"] {
      background: var(--accent) !important;
    }
    [role="switch"], [class*="switch"] {
      background: var(--s6) !important;
    }

    /* ── Images & Avatars ──────────────────────────────────── */
    [class*="avatar"], [class*="Avatar"] {
      border: 2px solid var(--b2) !important;
      border-radius: 50% !important;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 768px) {
      [class*="card"], .card { border-radius: var(--r-md) !important; }
      [role="dialog"], [class*="modal"] { border-radius: var(--r-lg) !important; }
      thead th { font-size: .65rem !important; padding: 8px 10px !important; }
      tbody td { font-size: .80rem !important; padding: 7px 10px !important; }
    }

    /* ── Glassmorphism surfaces (used by some modals) ──────── */
    [class*="glass"], [class*="Glass"] {
      background: rgba(22,24,31,.75) !important;
      backdrop-filter: blur(20px) saturate(160%) !important;
      border: 1px solid var(--b2) !important;
    }

    /* ── Code / monospace ──────────────────────────────────── */
    code, pre, [class*="code"], [class*="Code"] {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace !important;
      background: var(--s2) !important;
      border: 1px solid var(--b1) !important;
      border-radius: var(--r-xs) !important;
      font-size: .82rem !important;
      color: var(--accent-light) !important;
    }

    /* ── Tooltips ──────────────────────────────────────────── */

      function _decodeJWT(token) {
        try {
          var parts = token.split('.');
          if (parts.length < 2) return null;
          var b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
          while (b64.length % 4) b64 += '=';
          return JSON.parse(atob(b64));
        } catch(e) { return null; }
      }
      function _currentAdminName() {
        try {
          var adminRaw = localStorage.getItem('flotadsp_admin');
          if (adminRaw) {

            if (n) return n;
          }
        } catch(e) {}
        var token = localStorage.getItem('flotadsp_token');
        if (token) {
          var payload = _decodeJWT(token);
          if (payload) return (payload.name || '').trim().toLowerCase();
        }
        return '';

  <script>
    /* ── 1. Matrículas: texto en azul pastel ───────────────── */
    (function meryPlates() {
      var PLATE_RE = /\b(\d{4}[\s\-]?[A-Z]{3})\b/g;
      function wrapPlates(node) {
        if (!document.body.classList.contains('mery-theme')) return;
        if (node.nodeType === 3) {
          var text = node.textContent;
          PLATE_RE.lastIndex = 0;
          if (!PLATE_RE.test(text)) return;
          PLATE_RE.lastIndex = 0;
          var frag = document.createDocumentFragment(), last = 0, m;
          while ((m = PLATE_RE.exec(text)) !== null) {
            if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
            var sp = document.createElement('span');
            sp.className = 'mery-plate-text';
            sp.textContent = m[1].replace(/[\s\-]/g,'');
            frag.appendChild(sp);
            last = m.index + m[0].length;
          }
          if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
          if (frag.childNodes.length > 1) node.parentNode && node.parentNode.replaceChild(frag, node);
        } else if (node.nodeType === 1) {
          var t = node.tagName;
          if (t==='INPUT'||t==='TEXTAREA'||t==='SELECT'||t==='SCRIPT'||t==='STYLE') return;
          if (node.classList && node.classList.contains('mery-plate-text')) return;
          Array.from(node.childNodes).forEach(wrapPlates);
        }
      }
      var _obs = null;
      function startObs() {
        if (_obs) return;
        _obs = new MutationObserver(function(muts) {
          if (!document.body.classList.contains('mery-theme')) return;
          muts.forEach(function(m) { m.addedNodes.forEach(wrapPlates); });
        });
        _obs.observe(document.body, { childList: true, subtree: true });
        wrapPlates(document.body);
      }
      function stopObs() { if (_obs) { _obs.disconnect(); _obs = null; } }
      setInterval(function() {
        if (document.body.classList.contains('mery-theme')) startObs(); else stopObs();
      }, 1500);
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() { if (document.body.classList.contains('mery-theme')) startObs(); }, 800);
      });
    })();

        '🍦','🌙','⭐','🌊','🌈','🌠','🩷','🌷',
        '🪷','🍄','🌿','🫧','🎐','🏔️','🌅','🌠',
        '🏎️','🚕','🚑','🚒','🛻','🏍️','🛵','🚁',
        '🚂','⛵','🚤','🛥️','🚀','🛸','✈️','🚀',
        '🍕','🍔','🌮','🍩','🍪','🧁','🍿','🥑',
        '🍉','🍒','🥕','🌶️','🧀','🥐','🍤','🍫',
        '⚽','🏀','🎾','🏐','🥊','🏋️','🤸','⛷️',
        '🦖','🦕','🐉','🦅','🦚','🦉','🦩','🦈',
        '💪','🫶','👏','🤝','✌️','🤘','🫰','👑',
        '🌞','🌝','🌚','🌪️','❄️','☔','🌋','🏝️',
        '🎺','🥁','🎻','🪕','🎹','🎧','🎼','📯',
        '😂','🤣','😅','😆','😉','😊','🥰','😘',
        '🤔','🙄','😴','🥱','🤤','😪','🤧','🥶',
        '🥵','😱','🤬','😡','🥺','😭','🫠','🫥',
        '🤥','🤫','🤭','🫢','🫣','🙈','🙉','🙊',
        '💩','🍑','🥒','🍆','🌭','🥖','🧄','🧅',
        '🐔','🐣','🐥','🦃','🪿','🦆','🐤','🐧',
        '👶','🧓','👴','👵','💃','🕺','🧎','🏃'
      ];

      var KEY = 'mery_driver_stickers';
      var API_M = 'https://flotadsp-backend.fly.dev/api';
      function _tok(){ return localStorage.getItem('flotadsp_token')||''; }
      function _san(k){ return (k||'').replace(/[.$]/g,'_').slice(0,120); }
      /* Mapa en memoria, hidratado desde el SERVIDOR (persistente para siempre) */
      var DATA = (function(){ try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e){ return {}; } })();
      var _hydrated = false;
      function hydrate(cb){
        fetch(API_M+'/mery/stickers',{headers:{'Authorization':'Bearer '+_tok()}})
          .then(function(r){ return r.json(); })
          .then(function(j){
            if(j && j.stickers){ DATA = j.stickers; localStorage.setItem(KEY, JSON.stringify(DATA)); _hydrated = true; if(cb) cb(); }
          }).catch(function(){ _hydrated = true; if(cb) cb(); });
      }
      function _push(k, v){
        fetch(API_M+'/mery/stickers',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+_tok()},
          body:JSON.stringify({key:_san(k), value:v||null})}).catch(function(){});
      }
      function save(k,v)    { k=_san(k); DATA[k]=v; localStorage.setItem(KEY,JSON.stringify(DATA)); _push(k,v); }
      function del(k)       { k=_san(k); delete DATA[k]; localStorage.setItem(KEY,JSON.stringify(DATA)); _push(k,null); }
      function get(k)       { return DATA[_san(k)]||''; }

      /* Stickers de imagen (descargados al servidor propio) */
      var IMG_STICKERS = ['doge.png','capybara.png','stitch.png','tsum.png','minion.png',
                          'shrek.png','pikachu.png','kitty.png','duck.png'];

      /* ── Panel selector ── */
      var picker=null, aKey=null, aBtn=null;

      function openPicker(btn, key) {
        if (picker) picker.remove();
        picker = document.createElement('div');
        picker.id = 'mery-stk-picker';

        /* Nombre del conductor extraído del texto de la fila */
        var nameEl = btn.closest('tr');
        var driverName = nameEl ? (nameEl.querySelector('td:first-child')||nameEl).textContent.replace(/[^\w\s]/g,'').trim().slice(0,30) : '';

        picker.innerHTML =
          '<div id="mery-stk-picker-title">🎀 Pegatina del conductor</div>'+
          '<div id="mery-stk-picker-sub">'+(driverName?'"'+driverName+'"':'Elige una pegatina')+'</div>'+
          '<div id="mery-stk-picker-grid"></div>'+
          '<button id="mery-stk-clear">✖ Quitar pegatina</button>';

        var grid = picker.querySelector('#mery-stk-picker-grid');
        var cur = get(key);
        /* Fila de stickers premium (imágenes) */
        IMG_STICKERS.forEach(function(fn) {
          var val = 'img:' + fn;
          var o = document.createElement('span');
          o.className = 'mery-stk-option mery-stk-imgopt' + (val===cur?' selected':'');
          var im = document.createElement('img');
          im.src = '/assets/mery/' + fn;
          o.appendChild(im);
          o.addEventListener('click', function(e) {
            e.stopPropagation();
            save(key, val);
            refreshBtn(btn, key);
            picker.remove(); picker=null; aKey=null; aBtn=null;
          });
          grid.appendChild(o);
        });
        ALL.forEach(function(em) {
          var o = document.createElement('span');
          o.className = 'mery-stk-option' + (em===cur?' selected':'');
          o.textContent = em;
          o.addEventListener('click', function(e) {
            e.stopPropagation();
            save(key, em);
            refreshBtn(btn, key);
            picker.remove(); picker=null; aKey=null; aBtn=null;
          });
          grid.appendChild(o);
        });

        picker.querySelector('#mery-stk-clear').addEventListener('click', function(e) {
          e.stopPropagation();
          del(key);
          refreshBtn(btn, key);
          picker.remove(); picker=null; aKey=null; aBtn=null;
        });

        /* Posicionar */
        document.body.appendChild(picker);
        var r = btn.getBoundingClientRect();
        var top = r.bottom + 8;
        var left = Math.min(r.left - 10, window.innerWidth - 360);
        if (left < 8) left = 8;
        if (top + 440 > window.innerHeight) top = r.top - 440;
        if (top < 8) top = 8;
        picker.style.top  = top + 'px';
        picker.style.left = left + 'px';

        aKey=key; aBtn=btn;

        /* Cerrar al click fuera */
        setTimeout(function() {
          document.addEventListener('click', function _close(e) {
            if (picker && !picker.contains(e.target) && e.target !== btn) {
              picker.remove(); picker=null; aKey=null; aBtn=null;
              document.removeEventListener('click', _close);
            }
          });
        }, 50);
      }

      function refreshBtn(btn, key) {
        var v = get(key);
        if (v && v.indexOf('img:') === 0) {
          btn.textContent = '';
          var im = document.createElement('img');
          im.src = '/assets/mery/' + v.slice(4);
          im.style.cssText = 'width:28px;height:28px;object-fit:contain;border-radius:50%;pointer-events:none';
          btn.appendChild(im);
          btn.title = 'Cambiar pegatina';
        } else {
          btn.textContent = v || '➕';
          btn.title = v ? 'Cambiar pegatina (ahora: '+v+')' : 'Añadir pegatina al conductor';
        }
        btn.classList.toggle('has-sticker', !!v);
      }

      /* ── Clave única por conductor ── */
      function rowKey(tr) {
        /* La pegatina es de la PERSONA: si la fila tiene un conductor seleccionado
           (cuadrante), la clave es su nombre. Si no, la primera celda (lista de personas). */
        var sel = tr.querySelector('select');
        if (sel && sel.value) {
          var opt = sel.options[sel.selectedIndex];
          var nm = (opt && opt.textContent || '').replace(/s+/g, ' ').trim();
          if (nm.length > 2 && nm.indexOf('Sin asignar') < 0) return 'drv:' + nm.slice(0, 60);
        }
        var tds = tr.querySelectorAll('td');
        for (var i = 0; i < tds.length; i++) {
          if (tds[i].classList.contains('mery-stk-cell')) continue;
          var txt = (tds[i].textContent || '').replace(/s+/g, ' ').trim();
          if (txt.length > 2) return txt.slice(0, 60);
        }
        return (tr.textContent || '').replace(/s+/g, ' ').trim().slice(0, 80);
      }
      /* ── Inyectar celda de pegatina en cada fila de tabla ── */
      function injectRow(tr) {
        if (tr.querySelector('.mery-stk-cell')) return; /* ya procesada */
        var tds = tr.querySelectorAll('td');
        if (!tds.length) return;

        var key = rowKey(tr);

        /* Crear td de pegatina y ponerlo PRIMERO */
        var cell = document.createElement('td');
        cell.className = 'mery-stk-cell';

        var btn = document.createElement('button');
        btn.className = 'mery-stk-btn';
        btn.type = 'button';
        refreshBtn(btn, key);

        btn.addEventListener('click', function(e) {
          e.stopPropagation(); e.preventDefault();
          openPicker(btn, rowKey(tr));
        });

        cell.appendChild(btn);
        tr.insertBefore(cell, tr.firstChild);
      }

      /* ── Inyectar th de cabecera en thead ── */
      function injectHeader(thead) {
        var tr = thead.querySelector('tr');
        if (!tr || tr.querySelector('.mery-stk-header')) return;
        var th = document.createElement('th');
        th.className = 'mery-stk-header';
        th.textContent = '🎀';
        tr.insertBefore(th, tr.firstChild);
      }

      /* ── Escanear todas las tablas visibles ── */
      function scan() {
        if (!isMeryActive()) return;
        document.body.querySelectorAll('table').forEach(function(table) {
          var thead = table.querySelector('thead');
          if (thead) injectHeader(thead);
          table.querySelectorAll('tbody tr').forEach(function(tr) {
            var txt = (tr.textContent||'').trim();
            if (txt.length > 3) injectRow(tr);
          });
        });
      }

      /* ── Observer + arranque ── */
      var obs = new MutationObserver(function() {
        if (!isMeryActive()) return;
        clearTimeout(obs._t);
        obs._t = setTimeout(scan, 250);
      });

      /* La pegatina sigue a la persona: al cambiar el conductor, repintar */
      document.addEventListener('change', function(ev) {
        if (!isMeryActive()) return;
        var sel = ev.target;
        if (!sel || sel.tagName !== 'SELECT') return;
        var tr = sel.closest('tr');
        if (!tr) return;
        var btn = tr.querySelector('.mery-stk-btn');
        if (btn) setTimeout(function(){ refreshBtn(btn, rowKey(tr)); }, 120);
      }, true);

      function start() {
        hydrate(function(){
          /* repintar pegatinas ya renderizadas con los datos del servidor */
          document.querySelectorAll('.mery-stk-btn').forEach(function(b){
            var tr = b.closest('tr'); if (tr) refreshBtn(b, rowKey(tr));
          });
        });
        scan();
        obs.observe(document.body, { childList:true, subtree:true });
      }
      function stop() {
        obs.disconnect();
        if (picker) { picker.remove(); picker=null; }
        /* Quitar celdas inyectadas al salir de sesión Mery */
        document.querySelectorAll('.mery-stk-cell,.mery-stk-header').forEach(function(el){ el.remove(); });
      }

      /* Arrancar cuando Mery inicia sesión, parar cuando sale */
      var wasActive = false;
      setInterval(function() {
        var active = isMeryActive();
        if (active && !wasActive) start();
        if (!active && wasActive) stop();
        wasActive = active;
      }, 800);

      /* Reescanear en cambios de ruta SPA */
      var _origPush = history.pushState;
      history.pushState = function(){ _origPush.apply(this,arguments); setTimeout(scan,700); };
      window.addEventListener('popstate', function(){ setTimeout(scan,700); });

      document.addEventListener('DOMContentLoaded', function(){
        setTimeout(function(){ if(isMeryActive()) start(); }, 1200);
      });
    })();
  </script>
  <!-- FlotaDSP — Scoring Conductores v2: ranking compacto y competitivo -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function apiGet(p){ return fetch(API+p,{headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function waitReact(cb){ var t=setInterval(function(){ if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);} },120); }

    waitReact(function(React){
      var h = React.createElement;

      var PILLARS = [
        {k:'compliance',   max:30, label:'Cumplimiento',  icon:'📋', color:'#3b82f6'},
        {k:'punctuality',  max:15, label:'Puntualidad',   icon:'⏰', color:'#06b6d4'},
        {k:'evidence',     max:15, label:'Evidencia',     icon:'📸', color:'#8b5cf6'},
        {k:'honesty',      max:15, label:'Honestidad',    icon:'🔍', color:'#14b8a6'},
        {k:'conservation', max:25, label:'Conservación',  icon:'🛡️', color:'#f97316'}
      ];
      function scoreColor(s){ return s>=80?'#22c55e':s>=65?'#4ade80':s>=50?'#f59e0b':s>=35?'#f97316':'#ef4444'; }
      function scoreLabel(s){ return s>=80?'Ejemplar':s>=65?'Bueno':s>=50?'Mejorable':s>=35?'Deficiente':'Crítico'; }
      function medal(i){ return ['🥇','🥈','🥉'][i]||''; }
      function initials(n){ return (n||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(); }
      function monthName(m){return ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][m]||'';}
      function Avatar(d, size){
        return d.photo_url
          ? h('img',{src:d.photo_url,style:{width:size+'px',height:size+'px',borderRadius:'50%',objectFit:'cover',border:'2px solid '+scoreColor(d.total||0)+'88',flexShrink:0}})
          : h('div',{style:{width:size+'px',height:size+'px',borderRadius:'50%',flexShrink:0,
              background:scoreColor(d.total||0)+'22',border:'2px solid '+scoreColor(d.total||0)+'66',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontSize:(size/3)+'px',fontWeight:800,color:scoreColor(d.total||0)}},initials(d.name));
      }

      window.__FlotaScoring = function(props){
        var xs=React.useState(null),scores=xs[0],setScores=xs[1];
        var xl=React.useState(true),loading=xl[0],setLoading=xl[1];
        var xd=React.useState(null),detail=xd[0],setDetail=xd[1];

        var xi=React.useState(false),showIns=xi[0],setShowIns=xi[1];
        var now=new Date();
        var xm=React.useState(now.getMonth()+1),selMonth=xm[0],setSelMonth=xm[1];
        var xy=React.useState(now.getFullYear()),selYear=xy[0],setSelYear=xy[1];

        React.useEffect(function(){
          setLoading(true);
          apiGet('/scoring/drivers?month='+selMonth+'&year='+selYear).then(function(res){
            setScores(res.scores||[]); setLoading(false);
          }).catch(function(){ setLoading(false); });
        },[selMonth,selYear]);

        var all=(scores||[]).filter(function(d){return centro==='Todos'||d.center===centro;});
        var ranked=all.filter(function(d){return !d.insufficient;});
        var insuf=all.filter(function(d){return d.insufficient;});

        var selStyle={background:'#1c1f28',border:'1px solid rgba(255,255,255,.12)',color:'#c8ccd6',borderRadius:'8px',padding:'6px 10px',fontSize:'12px'};

        return h('div',{style:{padding:'20px',maxWidth:'860px',margin:'0 auto'}},
          /* Cabecera */
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px',flexWrap:'wrap',gap:'10px'}},
            h('div',null,
              h('h1',{style:{margin:0,fontSize:'21px',fontWeight:800,color:'#f4f5f8'}},'🏆 Scoring de Conductores'),
              h('p',{style:{margin:'3px 0 0',fontSize:'12px',color:'#8892a4'}},

            h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},
              h('select',{value:selMonth,onChange:function(e){setSelMonth(Number(e.target.value));},style:selStyle},

          !loading && ranked.length===0 && h('div',{style:{textAlign:'center',padding:'60px 0',color:'#8892a4'}},
            '📭 Nadie alcanza aún las 3 inspecciones mínimas este mes'),

          /* Podio compacto */
          !loading && ranked.length>=3 && h('div',{style:{display:'flex',gap:'10px',marginBottom:'16px'}},
            [1,0,2].map(function(ri){
              var d=ranked[ri]; if(!d) return null;

              }},

          !loading && h('div',{style:{display:'flex',flexDirection:'column',gap:'6px'}},
            ranked.map(function(d,i){

            }},(showIns?'▾':'▸')+' '+insuf.length+' conductores sin datos suficientes (<3 inspecciones este mes)'),

              insuf.map(function(d){
                return h('span',{key:d.driver_id,style:{fontSize:'11px',color:'#8892a4',background:'rgba(255,255,255,.04)',

          detail&&h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',backdropFilter:'blur(6px)',

            h('div',{style:{background:'#111318',border:'1px solid rgba(255,255,255,.12)',borderRadius:'20px',

                Avatar(detail,56),
                h('div',{style:{flex:1}},
                  h('h3',{style:{margin:0,fontSize:'17px',fontWeight:800,color:'#f4f5f8'}},detail.name),

  <!-- FlotaDSP — Lupa universal de fotos: zoom, arrastre y navegación -->
  <script>
  (function(){
    /* Cualquier foto de inspección (R2) de tamaño decente, al clicarla se abre
       en pantalla completa con zoom (rueda/doble-click), arrastre y flechas. */

    function isInspectionPhoto(img){
      var s = img.src || '';
      if (s.indexOf('r2.dev') < 0) return false;
      if (s.indexOf('/drivers/') >= 0 || s.indexOf('/docs/') >= 0 || s.indexOf('/backups/') >= 0) return false;
      if (s.indexOf('/assets/') >= 0) return false;
      return true;
    }

    function openLightbox(gallery, index){
      var old = document.getElementById('fdsp-lightbox');
      if (old) old.remove();

      var scale = 1, tx = 0, ty = 0, rot = 0;
      var dragging = false, lastX = 0, lastY = 0;
      var idx = index;

      var ov = document.createElement('div');
      ov.id = 'fdsp-lightbox';
      ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:99999;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none';

      var img = document.createElement('img');
      img.style.cssText = 'max-width:92vw;max-height:88vh;user-select:none;cursor:grab;transition:transform .08s ease-out';
      img.draggable = false;

      function apply(){ img.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+') rotate('+rot+'deg)'; }
      function load(){
        img.src = gallery[idx];
        scale = 1; tx = 0; ty = 0; rot = 0; apply();
        counter.textContent = (idx+1) + ' / ' + gallery.length;
      }

      /* Controles */
      function mkBtn(txt, title, right, top){
        var b = document.createElement('button');
        b.textContent = txt; b.title = title;
        b.style.cssText = 'position:fixed;top:'+top+'px;right:'+right+'px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(30,32,40,.85);color:#e5e7eb;font-size:17px;cursor:pointer;z-index:100000;backdrop-filter:blur(6px)';
        ov.appendChild(b);
        return b;
      }
      var btnClose = mkBtn('✕','Cerrar (Esc)',14,14);
      var btnRot   = mkBtn('⟳','Rotar',62,14);
      var btnDl    = mkBtn('⤓','Descargar',110,14);
      var btnZoomI = mkBtn('+','Acercar',14,66);
      var btnZoomO = mkBtn('−','Alejar',14,114);

      var counter = document.createElement('div');
      counter.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:#cbd2dd;font-size:13px;font-weight:700;background:rgba(30,32,40,.85);border:1px solid rgba(255,255,255,.18);border-radius:99px;padding:6px 16px;z-index:100000';
      ov.appendChild(counter);

      var hint = document.createElement('div');
      hint.textContent = 'Rueda o doble-click: zoom · arrastra para mover · ← → cambiar foto';
      hint.style.cssText = 'position:fixed;top:18px;left:50%;transform:translateX(-50%);color:#7d8595;font-size:11.5px;z-index:100000';
      ov.appendChild(hint);
      setTimeout(function(){ hint.style.transition='opacity 1s'; hint.style.opacity='0'; }, 3500);

      function navBtn(txt, side){
        var b = document.createElement('button');
        b.textContent = txt;
        b.style.cssText = 'position:fixed;'+side+':12px;top:50%;transform:translateY(-50%);width:46px;height:64px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(30,32,40,.75);color:#e5e7eb;font-size:22px;cursor:pointer;z-index:100000';
        ov.appendChild(b);
        return b;
      }
      var prev = null, next = null;
      if (gallery.length > 1) {
        prev = navBtn('‹','left');
        next = navBtn('›','right');
        prev.addEventListener('click', function(e){ e.stopPropagation(); idx = (idx-1+gallery.length)%gallery.length; load(); });
        next.addEventListener('click', function(e){ e.stopPropagation(); idx = (idx+1)%gallery.length; load(); });
      }

      btnClose.addEventListener('click', close);
      btnRot.addEventListener('click', function(e){ e.stopPropagation(); rot = (rot+90)%360; apply(); });
      btnDl.addEventListener('click', function(e){
        e.stopPropagation();
        var a = document.createElement('a');
        a.href = gallery[idx]; a.download = 'inspeccion_foto_'+(idx+1)+'.jpg'; a.target='_blank';
        a.click();
      });
      btnZoomI.addEventListener('click', function(e){ e.stopPropagation(); scale = Math.min(6, scale*1.4); apply(); });
      btnZoomO.addEventListener('click', function(e){ e.stopPropagation(); scale = Math.max(1, scale/1.4); if(scale===1){tx=0;ty=0;} apply(); });

      /* Zoom con rueda, centrado en el cursor */
      ov.addEventListener('wheel', function(e){
        e.preventDefault();
        var f = e.deltaY < 0 ? 1.18 : 1/1.18;
        var ns = Math.min(6, Math.max(1, scale*f));
        if (ns !== scale) {
          var r = img.getBoundingClientRect();
          var cx = e.clientX - r.left - r.width/2;
          var cy = e.clientY - r.top - r.height/2;
          tx -= cx*(ns/scale-1); ty -= cy*(ns/scale-1);
          scale = ns;
          if (scale === 1) { tx = 0; ty = 0; }
          apply();
        }
      }, {passive:false});

      /* Doble click: alternar 1x ↔ 2.5x */
      img.addEventListener('dblclick', function(e){
        e.stopPropagation();
        if (scale > 1) { scale = 1; tx = 0; ty = 0; }
        else { scale = 2.5; }
        apply();
      });

      /* Arrastre */
      img.addEventListener('pointerdown', function(e){
        dragging = true; lastX = e.clientX; lastY = e.clientY;
        img.style.cursor = 'grabbing'; img.setPointerCapture(e.pointerId);
      });
      img.addEventListener('pointermove', function(e){
        if (!dragging) return;
        tx += e.clientX - lastX; ty += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY; apply();
      });
      img.addEventListener('pointerup', function(){ dragging = false; img.style.cursor = 'grab'; });

      /* Pinch en móvil */
      var pinchDist = 0;
      ov.addEventListener('touchmove', function(e){
        if (e.touches.length === 2) {
          e.preventDefault();
          var d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
          if (pinchDist) { scale = Math.min(6, Math.max(1, scale * d/pinchDist)); apply(); }
          pinchDist = d;
        }
      }, {passive:false});
      ov.addEventListener('touchend', function(){ pinchDist = 0; });

      ov.addEventListener('click', function(e){ if (e.target === ov) close(); });

      function onKey(e){
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowLeft' && prev) prev.click();
        else if (e.key === 'ArrowRight' && next) next.click();
        else if (e.key === '+') btnZoomI.click();
        else if (e.key === '-') btnZoomO.click();
      }
      document.addEventListener('keydown', onKey);

      function close(){
        document.removeEventListener('keydown', onKey);
        ov.remove();
      }

      ov.appendChild(img);
      document.body.appendChild(ov);
      load();
    }

    /* Delegación global: click en cualquier foto de inspección grande */
    document.addEventListener('click', function(e){
      var img = e.target;
      if (!img || img.tagName !== 'IMG') return;
      if (!isInspectionPhoto(img)) return;
      var r = img.getBoundingClientRect();
      if (r.width < 120) return;            /* miniaturas: respetan su click propio */
      if (img.closest('#fdsp-lightbox')) return;
      e.preventDefault(); e.stopPropagation();
      /* Galería: todas las fotos de inspección visibles en la página, en orden */
      var all = Array.prototype.slice.call(document.querySelectorAll('img'))
        .filter(function(i2){ return isInspectionPhoto(i2) && !i2.closest('#fdsp-lightbox'); })
        .map(function(i2){ return i2.src; });
      var gallery = all.filter(function(v, i3){ return all.indexOf(v) === i3; });
      var idx = Math.max(0, gallery.indexOf(img.src));
      openLightbox(gallery, idx);
    }, true);
  })();
  </script>

    /* Paleta según el tema activo (Mery pastel / Judyt Stitch / oscuro normal) */

        card:'#fdf6fb', border:'rgba(200,120,180,.35)', text:'#1a5c8a', sub:'#5298c4',

        ['name','Nombre completo','text'],

      ];

        var val = (drv[f[0]]||'').toString().replace(/"/g,'&quot;');
        return '<div style="margin-bottom:10px">'+
          '<label style="display:block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:'+T.sub+';margin-bottom:4px">'+f[1]+'</label>'+
          '<input id="fdsp-f-'+f[0]+'" type="'+f[2]+'" value="'+val+'" style="width:100%;box-sizing:border-box;background:'+T.inputBg+';border:1px solid '+T.inputBorder+';border-radius:9px;color:'+T.inputText+';padding:8px 11px;font-size:13px;outline:none">'+
        '</div>';

        '<select id="fdsp-f-center" style="width:100%;box-sizing:border-box;background:'+T.inputBg+';border:1px solid '+T.inputBorder+';border-radius:9px;color:'+T.inputText+';padding:8px 11px;font-size:13px">'+

        '<div style="display:flex;align-items:center;gap:16px;margin-bottom:18px">'+
          '<div style="position:relative;flex-shrink:0">'+
            '<div id="fdsp-drv-avatar" style="width:78px;height:78px;border-radius:50%;background:'+T.avatarBg+';border:2px solid '+T.avatarBorder+';display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:'+T.avatarText+';overflow:hidden">'+
              (drv.photo_url ? '<img src="'+drv.photo_url+'" style="width:100%;height:100%;object-fit:cover">' : initial)+
            '</div>'+
            '<button id="fdsp-drv-photo" title="Cambiar imagen" style="position:absolute;bottom:-2px;right:-2px;width:28px;height:28px;border-radius:50%;background:'+T.accent+';border:2px solid '+T.card+';color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">📷</button>'+
          '</div>'+
          '<div style="flex:1;min-width:0">'+
            '<h3 style="margin:0;font-size:17px;font-weight:800;color:'+T.text+'">'+(drv.name||'—')+'</h3>'+
            '<p style="margin:4px 0 0;font-size:12px;color:'+T.sub+'">Conductor · '+(drv.center||'—')+'</p>'+
            '<p id="fdsp-photo-status" style="margin:4px 0 0;font-size:11px;color:'+T.sub+'"></p>'+
          '</div>'+
          '<button id="fdsp-drv-close" style="background:none;border:none;color:'+T.sub+';font-size:22px;cursor:pointer;line-height:1;align-self:flex-start">×</button>'+
        '</div>'+
        inputs + centerSel +
        '<input type="file" accept="image/*" id="fdsp-drv-file" style="display:none">'+
        '<div style="display:flex;gap:10px;margin-top:16px">'+
          '<button id="fdsp-drv-save" style="flex:1;padding:11px;border-radius:11px;border:none;background:'+T.accentGrad+';color:#fff;font-size:14px;font-weight:800;cursor:pointer">💾 Guardar cambios</button>'+
          '<button id="fdsp-drv-cancel" style="padding:11px 18px;border-radius:11px;border:1px solid '+T.cancelBorder+';background:transparent;color:'+T.cancelText+';font-size:13px;cursor:pointer">Cerrar</button>'+
        '</div>'+
      '</div>';

      document.body.appendChild(ov);
      document.getElementById('fdsp-drv-close').addEventListener('click', function(){ ov.remove(); });
      document.getElementById('fdsp-drv-cancel').addEventListener('click', function(){ ov.remove(); });

      /* ── Foto: subida inmediata, pero Guardar la ESPERA si sigue en curso ── */
      var fileInput = document.getElementById('fdsp-drv-file');
      document.getElementById('fdsp-drv-photo').addEventListener('click', function(){ fileInput.click(); });
      fileInput.addEventListener('change', function(){
        var f = fileInput.files && fileInput.files[0];
        if (!f) return;
        var st = document.getElementById('fdsp-photo-status');
        st.textContent = '⏳ Subiendo imagen…';
        st.style.color = T.sub;
        var fd = new FormData();
        fd.append('file', f, 'foto.jpg');
        pendingPhotoUpload = fetch(API + '/drivers/' + drv.id + '/photo', {
          method: 'POST', headers: { 'Authorization': 'Bearer ' + tok() }, body: fd
        }).then(function(r){ return r.json(); }).then(function(j){
          if (j.success && j.photo_url) {
            document.getElementById('fdsp-drv-avatar').innerHTML = '<img src="'+j.photo_url+'" style="width:100%;height:100%;object-fit:cover">';
            st.textContent = '✅ Imagen guardada';
            st.style.color = '#22a55e';
          } else {
            st.textContent = '❌ ' + (j.detail || 'No se pudo subir la imagen');
            st.style.color = '#e05050';
          }
          pendingPhotoUpload = null;
          return j;
        }).catch(function(){
          st.textContent = '❌ Error de conexión subiendo la imagen';
          st.style.color = '#e05050';
          pendingPhotoUpload = null;
        });
      });

      /* ── Guardar: espera a que termine la foto antes de recargar ── */
      document.getElementById('fdsp-drv-save').addEventListener('click', function(){
        var btn = this;
        var payload = {
          name: document.getElementById('fdsp-f-name').value.trim(),
          email: document.getElementById('fdsp-f-email').value.trim(),
          login: document.getElementById('fdsp-f-login').value.trim(),
          driver_id: document.getElementById('fdsp-f-driver_id').value.trim(),
          phone: document.getElementById('fdsp-f-phone').value.trim(),
          dni: document.getElementById('fdsp-f-dni').value.trim(),
          center: document.getElementById('fdsp-f-center').value
        };
        if (!payload.name) { btn.textContent = '❌ El nombre es obligatorio'; setTimeout(function(){btn.textContent='💾 Guardar cambios';},1800); return; }
        btn.textContent = '⏳ Guardando…';
        btn.disabled = true;

        var waitPhoto = pendingPhotoUpload ? pendingPhotoUpload : Promise.resolve();
        waitPhoto.then(function(){
          return fetch(API + '/drivers/' + drv.id, {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + tok(), 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }).then(function(r){ return r.json(); }).then(function(j){
          if (j.success) {
            btn.textContent = '✅ Guardado';
            setTimeout(function(){ ov.remove(); location.reload(); }, 700);
          } else {
            btn.textContent = '❌ ' + (j.detail || 'Error guardando');
            btn.disabled = false;
            setTimeout(function(){btn.textContent='💾 Guardar cambios';},2200);
          }
        }).catch(function(){
          btn.textContent = '❌ Error de conexión';
          btn.disabled = false;
          setTimeout(function(){btn.textContent='💾 Guardar cambios';},2200);
        });
      });
    };
  })();
  </script>
  <!-- FlotaDSP — Panel "Tu atención hoy" del Dashboard -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function waitReact(cb){ var t=setInterval(function(){ if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);} },120); }

    waitReact(function(React){
      var h = React.createElement;

      window.__FlotaAttention = function(props){
        var nav = props.nav;
        var st = React.useState(null), data = st[0], setData = st[1];
        React.useEffect(function(){
          fetch(API + '/stats/attention', {headers:{'Authorization':'Bearer '+tok()}})
            .then(function(r){ return r.json(); })
            .then(setData).catch(function(){});
        }, []);
        if (!data || data.detail) return null;

        var euros = function(n){ return (n||0).toLocaleString('es-ES') + ' \u20AC'; };
        var diff = (data.cost_this_month||0) - (data.cost_prev_month||0);
        var allClear = !data.pending_review && !data.open_incidents && !data.missing_today_count && !data.failed_analyses;

        var items = [
          {n: data.missing_today_count, label: 'sin inspeccionar hoy', icon: '\uD83D\uDE90', color: '#ef4444', to: '/cuadrante',
           sub: data.assigned_today ? 'de ' + data.assigned_today + ' asignadas' : ''},
          {n: data.pending_review, label: 'por revisar', icon: '\u2705', color: '#f97316', to: '/revision'},
          {n: data.open_incidents, label: 'incidentes abiertos', icon: '\u26A0\uFE0F', color: '#f59e0b', to: '/incidencias'},
          {n: data.failed_analyses, label: 'an\u00E1lisis fallidos (48h)', icon: '\uD83E\uDD16', color: '#8b5cf6', to: '/inspecciones'}
        ];

        return h('div', {style:{
          background:'linear-gradient(135deg, rgba(22,24,31,.95), rgba(17,19,24,.98))',
          border:'1px solid rgba(255,255,255,.08)', borderRadius:'16px',
          padding:'16px 18px', marginBottom:'4px'
        }},
          h('div', {style:{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'12px', flexWrap:'wrap', gap:'8px'}},
            h('span', {style:{fontSize:'12px', fontWeight:800, color:'#8892a4', letterSpacing:'.06em', textTransform:'uppercase'}},
              allClear ? '\u2728 Todo al d\u00EDa' : '\uD83D\uDC41\uFE0F Tu atenci\u00F3n hoy'),
          h('div', {style:{display:'flex', alignItems:'center', gap:'10px'}},
              h('span', {style:{fontSize:'12px', color:'#8892a4'}}, 'Da\u00F1os este mes:'),
              h('span', {style:{fontSize:'17px', fontWeight:800, color: diff > 0 ? '#ef4444' : '#22c55e'}},
                euros(data.cost_this_month)),
              data.cost_prev_month > 0 ? h('span', {style:{
                fontSize:'11px', fontWeight:700, padding:'2px 8px', borderRadius:'99px',
                color: diff > 0 ? '#f87171' : '#4ade80',
                background: diff > 0 ? 'rgba(239,68,68,.12)' : 'rgba(34,197,94,.12)'
              }}, (diff > 0 ? '\u25B2 +' : '\u25BC ') + euros(Math.abs(diff)) + ' vs mes pasado') : null
            )
          ),
          h('div', {style:{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(150px, 1fr))', gap:'10px'}},
            items.map(function(it, i){
              var zero = !it.n;
              return h('button', {key:i, onClick:function(){ if(nav) nav(it.to); }, style:{
                display:'flex', alignItems:'center', gap:'10px', textAlign:'left',
                padding:'10px 12px', borderRadius:'11px', cursor:'pointer',
                background: zero ? 'rgba(255,255,255,.03)' : it.color + '14',
                border: '1px solid ' + (zero ? 'rgba(255,255,255,.06)' : it.color + '40'),
                opacity: zero ? .55 : 1, transition:'all .15s'
              }},
                h('span', {style:{fontSize:'18px'}}, it.icon),
                h('div', null,
                  h('div', {style:{fontSize:'18px', fontWeight:800, color: zero ? '#8892a4' : it.color, lineHeight:1}}, String(it.n||0)),
                  h('div', {style:{fontSize:'11px', color:'#8892a4', marginTop:'2px'}}, it.label + (it.sub && it.n ? ' \u00B7 ' + it.sub : ''))
                )
              );
            })
          ),
          data.missing_today_count > 0 ? h('div', {style:{marginTop:'10px', fontSize:'12px', color:'#c8ccd6'}},
            h('span', {style:{color:'#f87171', fontWeight:700}}, 'Faltan: '),
            data.missing_today.map(function(m){ return m.driver + ' (' + m.plate + ')'; }).join(' \u00B7 ') +
            (data.missing_today_count > data.missing_today.length ? ' y ' + (data.missing_today_count - data.missing_today.length) + ' m\u00E1s' : '')
          ) : null
        );
      };
    });
  })();
  </script>
  <!-- FlotaDSP — Revisión rápida de inspecciones (solo admin) -->
  <script>
  (function(){
    var API = "https://flotadsp-backend.fly.dev/api";
    function tok(){ return localStorage.getItem("flotadsp_token")||""; }
    function apiGet(p){ return fetch(API+p,{headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function apiPost(p){ return fetch(API+p,{method:"POST",headers:{"Authorization":"Bearer "+tok()}}).then(function(r){return r.json();}); }
    function waitReact(cb){ var t=setInterval(function(){ if(window.__FlotaReact){clearInterval(t);cb(window.__FlotaReact);} },120); }

    waitReact(function(React){
      var h = React.createElement;

      function sevColor(s){
        s=(s||'').toLowerCase();
        if(s==='critico'||s==='crítico') return '#ef4444';
        if(s==='grave') return '#f97316';
        if(s==='moderado') return '#f59e0b';
        if(s==='leve') return '#fbbf24';
        if(s==='sin_danos'||s==='sin_daños') return '#22c55e';
        return '#6b7280';
      }
      function sevLabel(s){
        s=(s||'').toLowerCase();
        if(s==='sin_danos') return 'SIN DAÑOS';
        if(s==='sin_analisis') return 'SIN ANÁLISIS';
        return s.toUpperCase();
      }
      function fmtDate(iso){
        if(!iso) return '—';
        try{ var d=new Date(iso); return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso.slice(0,16); }
      }

      /* Mapa zona → índice de foto (orden fijo del portal conductor) */
      var ZONE_TO_PHOTO = {frontal:0, trasera:1, lateral_izquierdo:2, lateral_derecho:3};
      var ZONE_LABEL = {frontal:'Frontal', trasera:'Trasera', lateral_izquierdo:'Lateral izq.', lateral_derecho:'Lateral der.', techo:'Techo', otra:'Otra zona'};

      /* CSS de pulso (inyectado una vez) */
      if(!document.getElementById('fdsp-review-css')){
        var st=document.createElement('style');
        st.id='fdsp-review-css';
        st.textContent='@keyframes fdspPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}@keyframes fdspGlow{0%,100%{opacity:1}50%{opacity:.75}}';
        document.head.appendChild(st);
      }

      window.__FlotaReview = function(props){
        var toast=props.toast, nav=props.nav;
        var qs=React.useState(null),queue=qs[0],setQueue=qs[1];
        var ls=React.useState(true),loading=ls[0],setLoading=ls[1];
        var is_=React.useState(0),idx=is_[0],setIdx=is_[1];
        var ps=React.useState(0),photoIdx=ps[0],setPhotoIdx=ps[1];
        var cs=React.useState('Todos'),centro=cs[0],setCentro=cs[1];
        var ms=React.useState(false),marking=ms[0],setMarking=ms[1];
        var rs=React.useState(0),reviewed=rs[0],setReviewed=rs[1];
        var hs=React.useState(null),highlightDmg=hs[0],setHighlightDmg=hs[1];
        var fbs=React.useState({}),fb=fbs[0],setFb=fbs[1];
        function sendFeedback(item,di,verdict){
          var key=item.id+':'+di;
          setFb(function(p){var n2=Object.assign({},p);n2[key]=verdict;return n2;});
          fetch(API+'/inspections/'+item.id+'/damage-feedback',{method:'POST',headers:{'Authorization':'Bearer '+tok(),'Content-Type':'application/json'},body:JSON.stringify({damage_index:di,verdict:verdict,scope:'new'})}).then(function(r){return r.json();}).then(function(j){ if(j.dataset_size && toast) toast.success('🧠 Dataset IA: '+j.dataset_size+' ejemplos'); }).catch(function(){ if(toast)toast.error('No se pudo guardar el veredicto'); });
        }

        function load(){
          setLoading(true);
          apiGet('/inspections/review-queue'+(centro!=='Todos'?'?center='+centro:'')).then(function(r){
            setQueue(r.queue||[]); setIdx(0); setPhotoIdx(0); setLoading(false);
          }).catch(function(){ setLoading(false); });
        }
        React.useEffect(function(){ load(); },[centro]);

        function next(){ setPhotoIdx(0); setHighlightDmg(null); setIdx(function(i){ return i+1; }); }
        function markReviewed(item){
          if(marking) return;
          setMarking(true);
          apiPost('/inspections/'+item.id+'/mark-reviewed').then(function(){
            setReviewed(function(r){ return r+1; });
            setQueue(function(q){ return q.filter(function(x){ return x.id!==item.id; }); });
            setPhotoIdx(0); setHighlightDmg(null);
            setMarking(false);
          }).catch(function(){ if(toast)toast.error('Error marcando'); setMarking(false); });
        }
        function damagePhotoIdx(dmg, nPhotos){
          /* Preferir el índice de foto que indica la IA; si no, mapeo por zona */
          if(dmg && typeof dmg.photo_index === 'number' && dmg.photo_index >= 1 && dmg.photo_index <= nPhotos) return dmg.photo_index - 1;
          var pi = ZONE_TO_PHOTO[dmg && dmg.location_hint];
          return (typeof pi === 'number' && pi < nPhotos) ? pi : null;
        }
        function validBox(b){
          return Array.isArray(b) && b.length === 4 && b.some(function(v){ return v > 0; }) && b[2] > b[0] && b[3] > b[1];
        }
        /* Atajos: R = revisada · S = saltar · ←/→ = cambiar foto */
        React.useEffect(function(){
          function onKey(e){
            if (document.getElementById('fdsp-lightbox')) return;       /* la lupa tiene los suyos */
            if (/INPUT|TEXTAREA|SELECT/.test((e.target&&e.target.tagName)||'')) return;
            var it = pending[Math.min(idx, Math.max(0, pending.length-1))];
            if (!it) return;
            var k = e.key.toLowerCase();
            if (k === 'r') { e.preventDefault(); markReviewed(it); }
            else if (k === 's') { e.preventDefault(); next(); }
            else if (e.key === 'ArrowLeft') { setPhotoIdx(function(p){ return Math.max(0, p-1); }); }
            else if (e.key === 'ArrowRight') { setPhotoIdx(function(p){ return Math.min((it.photos||[]).length-1, p+1); }); }
          }
          document.addEventListener('keydown', onKey);
          return function(){ document.removeEventListener('keydown', onKey); };
        });

        function jumpToDamage(dmg, di, nPhotos){
          var pi = damagePhotoIdx(dmg, nPhotos);
          if(pi !== null) setPhotoIdx(pi);
          setHighlightDmg(di);
        }

        var pending=(queue||[]);
        var item=pending[Math.min(idx,Math.max(0,pending.length-1))];
        if(idx>=pending.length&&pending.length>0) item=pending[0];

        return h('div',{style:{padding:'24px',maxWidth:'860px',margin:'0 auto'}},
          /* Cabecera */
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px',flexWrap:'wrap',gap:'10px'}},
            h('div',null,
              h('h1',{style:{margin:0,fontSize:'22px',fontWeight:800,color:'#f4f5f8'}},'✅ Revisión rápida'),
              h('p',{style:{margin:'4px 0 0',fontSize:'13px',color:'#8892a4'}},
                pending.length>0 ? pending.length+' pendiente'+(pending.length!==1?'s':'')+(reviewed>0?' · '+reviewed+' revisada'+(reviewed!==1?'s':'')+' esta sesión':'') : 'Sin pendientes')
            ),
            h('div',{style:{display:'flex',gap:'6px'}},
              ['Todos','OGA5','DGA1','DGA2'].map(function(c){
                var active=centro===c;
                return h('button',{key:c,onClick:function(){setCentro(c);},style:{
                  padding:'6px 14px',borderRadius:'99px',fontSize:'12px',fontWeight:700,cursor:'pointer',
                  border:'1px solid '+(active?'rgba(249,115,22,.6)':'rgba(255,255,255,.10)'),
                  background:active?'rgba(249,115,22,.18)':'transparent',
                  color:active?'#fb923c':'#8892a4'
                }},c);
              })
            )
          ),

          loading && h('div',{style:{textAlign:'center',padding:'80px 0',color:'#8892a4'}},'⏳ Cargando cola…'),

          !loading && pending.length===0 && h('div',{style:{textAlign:'center',padding:'80px 20px'}},
            h('div',{style:{fontSize:'56px',marginBottom:'16px'}},'🎉'),
            h('h2',{style:{margin:'0 0 8px',fontSize:'20px',fontWeight:800,color:'#22c55e'}},'¡Todo revisado!'),
            h('p',{style:{color:'#8892a4',fontSize:'14px'}},reviewed>0?'Has revisado '+reviewed+' inspecciones en esta sesión.':'No hay inspecciones pendientes de revisar.')
          ),

          !loading && item && h('div',{style:{
            background:'#111318',border:'1px solid rgba(255,255,255,.08)',
            borderRadius:'20px',overflow:'hidden',boxShadow:'0 12px 40px rgba(0,0,0,.4)'
          }},
            /* Foto grande (envuelta para alinear la chincheta con la imagen real) */
            h('div',{style:{position:'relative',background:'#000',display:'flex',justifyContent:'center'}},
              item.photos&&item.photos.length>0 ? h('div',{style:{position:'relative',display:'inline-block'}},
                h('img',{
                  src:item.photos[Math.min(photoIdx,item.photos.length-1)],
                  style:{maxWidth:'100%',maxHeight:'52vh',display:'block'}
                }),
                /* Caja + chincheta del daño nuevo seleccionado */
                (function(){
                  if(highlightDmg===null||!item.new_damages||!item.new_damages[highlightDmg]) return null;
                  var nd=item.new_damages[highlightDmg];
                  var target=damagePhotoIdx(nd,item.photos.length);
                  if(target===null||target!==photoIdx||!validBox(nd.box_2d)) return null;
                  var b=nd.box_2d; /* [ymin,xmin,ymax,xmax] 0-1000 */
                  var top=b[0]/10, left=b[1]/10, hgt=(b[2]-b[0])/10, wdt=(b[3]-b[1])/10;
                  return h(React.Fragment,null,
                    h('div',{style:{
                      position:'absolute',top:top+'%',left:left+'%',width:wdt+'%',height:hgt+'%',
                      border:'2.5px solid #ef4444',borderRadius:'10px',pointerEvents:'none',
                      boxShadow:'0 0 0 2000px rgba(0,0,0,.25), 0 0 16px rgba(239,68,68,.6)',
                      animation:'fdspGlow 1.6s ease-in-out infinite'
                    }}),
                    h('div',{style:{
                      position:'absolute',top:top+'%',left:(left+wdt/2)+'%',
                      transform:'translate(-50%,-110%)',fontSize:'26px',pointerEvents:'none',
                      filter:'drop-shadow(0 2px 6px rgba(0,0,0,.8))',
                      animation:'fdspGlow 1.6s ease-in-out infinite'
                    }},'📍')
                  );
                })()
              ) : h('div',{style:{padding:'80px 0',textAlign:'center',color:'#4d5568'}},'Sin fotos'),
              /* Badge severidad sobre la foto */
              h('div',{style:{
                position:'absolute',top:'14px',left:'14px',
                background:sevColor(item.severity),color:'#fff',
                borderRadius:'99px',padding:'5px 14px',fontSize:'12px',fontWeight:800,letterSpacing:'.04em',
                boxShadow:'0 2px 12px rgba(0,0,0,.5)'
              }},sevLabel(item.severity)+(item.total_damages_count>0?' · '+item.total_damages_count+' daños':'')),
              /* Contador cola */
              h('div',{style:{
                position:'absolute',top:'14px',right:'14px',
                background:'rgba(0,0,0,.65)',color:'#c8ccd6',backdropFilter:'blur(8px)',
                borderRadius:'99px',padding:'5px 12px',fontSize:'12px',fontWeight:700
              }},(pending.indexOf(item)+1)+' de '+pending.length),
              /* Etiqueta flotante del daño nuevo seleccionado */
              highlightDmg!==null && item.new_damages && item.new_damages[highlightDmg] && h('div',{style:{
                position:'absolute',bottom:'14px',left:'50%',transform:'translateX(-50%)',
                background:'rgba(239,68,68,.92)',color:'#fff',backdropFilter:'blur(8px)',
                borderRadius:'99px',padding:'7px 16px',fontSize:'12px',fontWeight:700,
                maxWidth:'90%',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                animation:'fdspGlow 1.6s ease-in-out infinite',boxShadow:'0 4px 20px rgba(239,68,68,.4)'
              }},'🆕 '+(item.new_damages[highlightDmg].part||'Daño')+(item.new_damages[highlightDmg].description?' — '+item.new_damages[highlightDmg].description:''))
            ),

            /* Miniaturas (con punto rojo en zonas con daño nuevo) */
            item.photos&&item.photos.length>1 && h('div',{style:{display:'flex',gap:'6px',padding:'10px 16px',background:'#0d0f14',overflowX:'auto'}},
              item.photos.map(function(p,i){
                var zoneHasNew = item.has_reference && (item.new_damages||[]).some(function(nd){ return damagePhotoIdx(nd,item.photos.length)===i; });
                return h('div',{key:i,style:{position:'relative',flexShrink:0}},
                  h('img',{src:p,onClick:function(){setPhotoIdx(i);setHighlightDmg(null);},style:{
                    width:'56px',height:'42px',objectFit:'cover',borderRadius:'7px',cursor:'pointer',display:'block',
                    border:photoIdx===i?'2px solid #f97316':'2px solid transparent',opacity:photoIdx===i?1:.55
                  }}),
                  zoneHasNew && h('span',{style:{
                    position:'absolute',top:'-3px',right:'-3px',width:'12px',height:'12px',
                    borderRadius:'50%',background:'#ef4444',border:'2px solid #0d0f14',

                  }})
                );
