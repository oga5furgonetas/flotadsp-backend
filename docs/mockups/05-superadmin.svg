<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg{fill:#f4f6fb}.side{fill:#1a1030}.card{fill:#fff;stroke:#e6eaf0}
    .t{fill:#0f172a}.m{fill:#64748b}.w{fill:#fff}.b{fill:#3b5bdb}
    .green{fill:#16a34a}.red{fill:#dc2626}.amber{fill:#d97706}
    .navt{fill:#aab6d4;font-size:12px}.kl{fill:#64748b;font-size:10px;font-weight:bold}
    .kv{font-size:22px;font-weight:bold}.h{font-size:13px;font-weight:bold;fill:#0f172a}
    text{font-size:12px}
  </style>
  <rect width="1000" height="560" class="bg"/>
  <rect width="200" height="560" class="side"/>
  <rect x="14" y="18" width="26" height="26" rx="7" fill="#7c3aed"/>
  <text x="48" y="36" class="w" font-size="14" font-weight="bold">Superadmin</text>
  <rect x="10" y="62" width="180" height="34" rx="8" fill="#2a1b4d"/>
  <text x="22" y="84" class="w" font-size="12.5" font-weight="bold">🏢  Clientes</text>
  <text x="22" y="122" class="navt">💰  Ingresos</text>
  <text x="22" y="156" class="navt">⚡  Uso de IA</text>
  <text x="22" y="190" class="navt">🛟  Soporte</text>
  <text x="22" y="510" fill="#8696bd" font-size="10">CONECTADO COMO</text>
  <text x="22" y="528" class="w" font-size="12" font-weight="bold">Owner</text>
  <!-- top -->
  <rect x="200" y="0" width="800" height="56" class="w" stroke="#e6eaf0"/>
  <text x="222" y="34" class="t" font-size="16" font-weight="bold">Clientes (tenants)</text>
  <rect x="760" y="16" width="110" height="24" rx="12" fill="#dcfce7"/><text x="815" y="32" class="green" font-size="11" font-weight="bold" text-anchor="middle">MRR 9.340 €</text>
  <rect x="880" y="16" width="96" height="24" rx="12" fill="#eef1ff"/><text x="928" y="32" class="b" font-size="11" font-weight="bold" text-anchor="middle">41 activos</text>
  <!-- KPIs -->
  <rect x="222" y="74" width="178" height="74" rx="12" class="card"/><text x="238" y="98" class="kl">MRR</text><text x="238" y="126" class="kv t">9.340 €</text><text x="238" y="142" class="green" font-size="10">▲ +12% mes</text>
  <rect x="410" y="74" width="178" height="74" rx="12" class="card"/><text x="426" y="98" class="kl">CLIENTES ACTIVOS</text><text x="426" y="126" class="kv t">41</text>
  <rect x="598" y="74" width="178" height="74" rx="12" class="card"/><text x="614" y="98" class="kl">EN PRUEBA</text><text x="614" y="126" class="kv amber">6</text>
  <rect x="786" y="74" width="190" height="74" rx="12" class="card"/><text x="802" y="98" class="kl">COSTE IA (MES)</text><text x="802" y="126" class="kv red">1.180 €</text><text x="802" y="142" class="m" font-size="10">margen ~87%</text>
  <!-- table -->
  <rect x="222" y="164" width="754" height="340" rx="12" class="card"/>
  <text x="240" y="192" class="m" font-size="10" font-weight="bold">EMPRESA</text>
  <text x="430" y="192" class="m" font-size="10" font-weight="bold">PLAN</text>
  <text x="520" y="192" class="m" font-size="10" font-weight="bold">VEHÍCULOS</text>
  <text x="640" y="192" class="m" font-size="10" font-weight="bold">USO IA</text>
  <text x="800" y="192" class="m" font-size="10" font-weight="bold">ESTADO</text>
  <text x="920" y="192" class="m" font-size="10" font-weight="bold">MRR</text>
  <line x1="240" y1="202" x2="958" y2="202" stroke="#e6eaf0"/>
  <!-- row1 -->
  <text x="240" y="232" class="t" font-size="12.5" font-weight="bold">Transportes García SL</text>
  <text x="430" y="232" class="m">Growth</text><text x="520" y="232" class="m">28</text>
  <rect x="640" y="225" width="90" height="9" rx="4" fill="#eef2f8"/><rect x="640" y="225" width="61" height="9" rx="4" fill="#3b5bdb"/>
  <rect x="800" y="221" width="70" height="20" rx="10" fill="#dcfce7"/><text x="835" y="235" class="green" font-size="10" font-weight="bold" text-anchor="middle">Activo</text>
  <text x="920" y="232" class="t">199 €</text>
  <line x1="240" y1="252" x2="958" y2="252" stroke="#f0f3f8"/>
  <!-- row2 -->
  <text x="240" y="282" class="t" font-size="12.5" font-weight="bold">Reparto Norte SL</text>
  <text x="430" y="282" class="m">Pro</text><text x="520" y="282" class="m">54</text>
  <rect x="640" y="275" width="90" height="9" rx="4" fill="#eef2f8"/><rect x="640" y="275" width="74" height="9" rx="4" fill="#d97706"/>
  <rect x="800" y="271" width="70" height="20" rx="10" fill="#dcfce7"/><text x="835" y="285" class="green" font-size="10" font-weight="bold" text-anchor="middle">Activo</text>
  <text x="920" y="282" class="t">349 €</text>
  <line x1="240" y1="302" x2="958" y2="302" stroke="#f0f3f8"/>
  <!-- row3 -->
  <text x="240" y="332" class="t" font-size="12.5" font-weight="bold">Logística Sur</text>
  <text x="430" y="332" class="m">Starter</text><text x="520" y="332" class="m">9</text>
  <rect x="640" y="325" width="90" height="9" rx="4" fill="#eef2f8"/><rect x="640" y="325" width="36" height="9" rx="4" fill="#3b5bdb"/>
  <rect x="800" y="321" width="96" height="20" rx="10" fill="#fef3c7"/><text x="848" y="335" class="amber" font-size="10" font-weight="bold" text-anchor="middle">Prueba · 6 días</text>
  <text x="920" y="332" class="m">—</text>
  <line x1="240" y1="352" x2="958" y2="352" stroke="#f0f3f8"/>
  <!-- row4 -->
  <text x="240" y="382" class="t" font-size="12.5" font-weight="bold">DSP Levante</text>
  <text x="430" y="382" class="m">Growth</text><text x="520" y="382" class="m">31</text>
  <rect x="640" y="375" width="90" height="9" rx="4" fill="#eef2f8"/><rect x="640" y="375" width="85" height="9" rx="4" fill="#dc2626"/>
  <rect x="800" y="371" width="70" height="20" rx="10" fill="#fee2e2"/><text x="835" y="385" class="red" font-size="10" font-weight="bold" text-anchor="middle">Impago</text>
  <text x="920" y="382" class="t">199 €</text>
  <text x="240" y="440" class="m" font-size="11">Tu vista de negocio: cada DSP, su consumo de IA (= tu coste) y el MRR total.</text>
  <text x="240" y="458" class="m" font-size="11">El medidor de uso te avisa de quién se acerca a comerte el margen.</text>
  <text x="222" y="534" class="m" font-size="11">05 · Panel superadmin — controlas todo el negocio desde aquí.</text>
</svg>
