<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg{fill:#f4f6fb}.side{fill:#0f1729}.card{fill:#fff;stroke:#e6eaf0}
    .t{fill:#0f172a}.m{fill:#64748b}.w{fill:#fff}.b{fill:#3b5bdb}
    .green{fill:#16a34a}.red{fill:#dc2626}.amber{fill:#d97706}
    .navt{fill:#aab6d4;font-size:12px}.kl{fill:#64748b;font-size:10px;font-weight:bold}
    .kv{font-size:24px;font-weight:bold}.h{font-size:13px;font-weight:bold;fill:#0f172a}
    text{font-size:12px}
  </style>
  <rect width="1000" height="640" class="bg"/>
  <!-- sidebar -->
  <rect width="200" height="640" class="side"/>
  <rect x="14" y="18" width="26" height="26" rx="7" fill="#3b5bdb"/>
  <text x="48" y="36" class="w" font-size="15" font-weight="bold">FlotaDSP</text>
  <rect x="10" y="62" width="180" height="34" rx="8" fill="#1a2540"/>
  <text x="22" y="84" class="w" font-size="12.5" font-weight="bold">▢  Dashboard</text>
  <text x="22" y="122" class="navt">🔍  Inspecciones</text>
  <circle cx="178" cy="118" r="9" class="red"/><text x="178" y="122" class="w" font-size="10" text-anchor="middle" font-weight="bold">3</text>
  <text x="22" y="156" class="navt">📊  Scorecard</text>
  <text x="22" y="190" class="navt">🚐  Flota</text>
  <text x="22" y="224" class="navt">👷  Conductores</text>
  <text x="22" y="258" class="navt">🗓️  Turnos</text>
  <text x="22" y="292" class="navt">🔧  Talleres</text>
  <text x="22" y="326" class="navt">🔔  Alertas</text>
  <circle cx="178" cy="322" r="9" class="red"/><text x="178" y="326" class="w" font-size="10" text-anchor="middle" font-weight="bold">2</text>
  <text x="22" y="560" class="navt">⚙️  Ajustes</text>
  <line x1="14" y1="578" x2="186" y2="578" stroke="#2a375a"/>
  <text x="22" y="600" fill="#8696bd" font-size="10">EMPRESA</text>
  <text x="22" y="616" class="w" font-size="12" font-weight="bold">Transportes García SL</text>
  <rect x="22" y="624" width="150" height="16" rx="8" fill="#16351f"/>
  <text x="30" y="636" class="green" font-size="10" font-weight="bold">Plan Growth · activo</text>
  <!-- topbar -->
  <rect x="200" y="0" width="800" height="56" class="w" stroke="#e6eaf0"/>
  <text x="222" y="34" class="t" font-size="17" font-weight="bold">Buenos días, Mery 👋</text>
  <circle cx="935" cy="28" r="16" fill="#3b5bdb"/><text x="935" y="32" class="w" text-anchor="middle" font-size="11" font-weight="bold">MG</text>
  <text x="895" y="33" font-size="16">🔔</text><circle cx="903" cy="20" r="4" class="red"/>
  <!-- KPIs -->
  <g>
    <rect x="222" y="74" width="178" height="76" rx="12" class="card"/>
    <text x="238" y="98" class="kl">📊 SCORECARD</text>
    <text x="238" y="124" class="kv green">Fantastic</text>
    <text x="238" y="142" class="green" font-size="11">▲ subió desde Great</text>
  </g>
  <g>
    <rect x="410" y="74" width="178" height="76" rx="12" class="card"/>
    <text x="426" y="98" class="kl">🚐 FLOTA ACTIVA</text>
    <text x="426" y="124" class="kv t">28<tspan font-size="13" fill="#64748b">/30</tspan></text>
    <text x="426" y="142" class="m" font-size="11">2 en taller</text>
  </g>
  <g>
    <rect x="598" y="74" width="178" height="76" rx="12" class="card"/>
    <text x="614" y="98" class="kl">💥 DAÑOS SIN IMPUTAR</text>
    <text x="614" y="124" class="kv red">3</text>
    <text x="614" y="142" class="red" font-size="11">≈ 640 € en juego</text>
  </g>
  <g>
    <rect x="786" y="74" width="190" height="76" rx="12" class="card"/>
    <text x="802" y="98" class="kl">📋 ITV PRÓXIMAS</text>
    <text x="802" y="124" class="kv amber">2</text>
    <text x="802" y="142" class="m" font-size="11">vencen en 9 días</text>
  </g>
  <!-- damage queue -->
  <rect x="222" y="166" width="500" height="290" rx="12" class="card"/>
  <text x="240" y="192" class="h">💥 Cola de daños por revisar</text>
  <text x="700" y="192" class="b" font-size="11" text-anchor="end">Ver todos →</text>
  <g>
    <rect x="240" y="206" width="46" height="36" rx="6" fill="#0f1729"/><rect x="250" y="214" width="20" height="12" rx="2" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="298" y="222" class="t" font-size="12.5" font-weight="bold">1234-ABC</text>
    <text x="298" y="238" class="m" font-size="11">Arañazo lateral izq · IA 94%</text>
    <rect x="500" y="214" width="130" height="20" rx="10" fill="#fef3c7"/><text x="510" y="228" class="amber" font-size="10" font-weight="bold">Conductor turno 14/06</text>
    <rect x="642" y="212" width="62" height="24" rx="7" class="b"/><text x="673" y="228" class="w" font-size="11" text-anchor="middle" font-weight="bold">Imputar</text>
  </g>
  <line x1="240" y1="256" x2="704" y2="256" stroke="#f0f3f8"/>
  <g>
    <rect x="240" y="266" width="46" height="36" rx="6" fill="#0f1729"/><rect x="256" y="276" width="16" height="11" rx="2" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="298" y="282" class="t" font-size="12.5" font-weight="bold">5678-DEF</text>
    <text x="298" y="298" class="m" font-size="11">Abolladura parachoques · IA 88%</text>
    <rect x="520" y="274" width="90" height="20" rx="10" fill="#eef1f6"/><text x="565" y="288" class="m" font-size="10" font-weight="bold" text-anchor="middle">Sin asignar</text>
    <rect x="642" y="272" width="62" height="24" rx="7" fill="#fff" stroke="#e6eaf0"/><text x="673" y="288" class="t" font-size="11" text-anchor="middle" font-weight="bold">Revisar</text>
  </g>
  <line x1="240" y1="316" x2="704" y2="316" stroke="#f0f3f8"/>
  <g>
    <rect x="240" y="326" width="46" height="36" rx="6" fill="#0f1729"/><rect x="248" y="334" width="28" height="9" rx="2" fill="none" stroke="#dc2626" stroke-width="2"/>
    <text x="298" y="342" class="t" font-size="12.5" font-weight="bold">9012-GHI</text>
    <text x="298" y="358" class="m" font-size="11">Luna trasera grieta · IA 97%</text>
    <rect x="500" y="334" width="130" height="20" rx="10" fill="#fef3c7"/><text x="510" y="348" class="amber" font-size="10" font-weight="bold">Conductor turno 13/06</text>
    <rect x="642" y="332" width="62" height="24" rx="7" class="b"/><text x="673" y="348" class="w" font-size="11" text-anchor="middle" font-weight="bold">Imputar</text>
  </g>
  <text x="240" y="400" class="m" font-size="11">Revisa una inspección con 1 clic — la IA ya marcó el daño,</text>
  <text x="240" y="418" class="m" font-size="11">sugiere responsable y taller. Tú solo confirmas.</text>
  <!-- coverage donut -->
  <rect x="732" y="166" width="244" height="290" rx="12" class="card"/>
  <text x="750" y="192" class="h">🗓️ Cobertura de hoy</text>
  <circle cx="854" cy="270" r="58" fill="none" stroke="#eef2f8" stroke-width="16"/>
  <circle cx="854" cy="270" r="58" fill="none" stroke="#16a34a" stroke-width="16" stroke-dasharray="338 364" stroke-dashoffset="91" transform="rotate(-90 854 270)"/>
  <text x="854" y="268" class="t" font-size="22" font-weight="bold" text-anchor="middle">26/28</text>
  <text x="854" y="286" class="m" font-size="10" text-anchor="middle">rutas cubiertas</text>
  <rect x="788" y="350" width="132" height="22" rx="11" fill="#fee2e2"/><text x="854" y="365" class="red" font-size="11" font-weight="bold" text-anchor="middle">2 rutas sin conductor</text>
  <rect x="776" y="388" width="156" height="30" rx="8" fill="#fff" stroke="#e6eaf0"/><text x="854" y="408" class="t" font-size="11.5" font-weight="bold" text-anchor="middle">Asignar conductores →</text>
  <text x="200" y="476" class="m" font-size="11" x="222">01 · Dashboard del DSP — lo crítico arriba, lo accionable debajo.</text>
</svg>
