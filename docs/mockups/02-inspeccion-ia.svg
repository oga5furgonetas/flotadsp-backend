<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg{fill:#f4f6fb}.side{fill:#0f1729}.card{fill:#fff;stroke:#e6eaf0}
    .t{fill:#0f172a}.m{fill:#64748b}.w{fill:#fff}.b{fill:#3b5bdb}
    .green{fill:#16a34a}.red{fill:#dc2626}.amber{fill:#d97706}
    .navt{fill:#aab6d4;font-size:12px}.h{font-size:13px;font-weight:bold;fill:#0f172a}
    text{font-size:12px}
  </style>
  <rect width="1000" height="640" class="bg"/>
  <rect width="200" height="640" class="side"/>
  <rect x="14" y="18" width="26" height="26" rx="7" fill="#3b5bdb"/>
  <text x="48" y="36" class="w" font-size="15" font-weight="bold">FlotaDSP</text>
  <text x="22" y="84" class="navt">▢  Dashboard</text>
  <rect x="10" y="100" width="180" height="34" rx="8" fill="#1a2540"/>
  <text x="22" y="122" class="w" font-size="12.5" font-weight="bold">🔍  Inspecciones</text>
  <text x="22" y="156" class="navt">📊  Scorecard</text>
  <text x="22" y="190" class="navt">🚐  Flota</text>
  <text x="22" y="224" class="navt">👷  Conductores</text>
  <text x="22" y="560" class="navt">⚙️  Ajustes</text>
  <!-- top -->
  <rect x="200" y="0" width="800" height="56" class="w" stroke="#e6eaf0"/>
  <text x="222" y="34" class="t" font-size="16" font-weight="bold">Inspección #4821 · 1234-ABC</text>
  <rect x="760" y="16" width="150" height="24" rx="12" fill="#eef1ff"/><text x="835" y="32" class="b" font-size="11" font-weight="bold" text-anchor="middle">Pendiente de revisión</text>
  <rect x="920" y="16" width="56" height="24" rx="7" class="b"/><text x="948" y="32" class="w" font-size="11" font-weight="bold" text-anchor="middle">Sig. ›</text>
  <!-- photo panel -->
  <rect x="222" y="74" width="470" height="430" rx="12" class="card"/>
  <text x="240" y="100" class="h">📷 Fotos del conductor</text>
  <text x="674" y="100" class="m" font-size="11" text-anchor="end">4 imágenes</text>
  <rect x="240" y="112" width="434" height="250" rx="10" fill="#0f1729"/>
  <text x="457" y="245" fill="#46577d" font-size="13" text-anchor="middle">Lateral izquierdo</text>
  <!-- damage boxes -->
  <rect x="330" y="170" width="110" height="66" rx="4" fill="none" stroke="#dc2626" stroke-width="3"/>
  <rect x="330" y="150" width="92" height="18" rx="4" fill="#dc2626"/><text x="338" y="163" class="w" font-size="10" font-weight="bold">Arañazo · 94%</text>
  <rect x="500" y="250" width="66" height="44" rx="4" fill="none" stroke="#d97706" stroke-width="3"/>
  <rect x="500" y="230" width="110" height="18" rx="4" fill="#d97706"/><text x="508" y="243" class="w" font-size="10" font-weight="bold">Abolladura · 71%</text>
  <text x="240" y="384" class="m" font-size="11">🟥 Daño confirmado IA    🟧 Posible daño (revisar)</text>
  <!-- thumbnails -->
  <rect x="240" y="398" width="104" height="48" rx="7" fill="#0f1729"/><text x="292" y="426" fill="#46577d" font-size="10" text-anchor="middle">Frontal</text>
  <rect x="350" y="398" width="104" height="48" rx="7" fill="#0f1729"/><text x="402" y="426" fill="#46577d" font-size="10" text-anchor="middle">Trasera</text>
  <rect x="460" y="398" width="104" height="48" rx="7" fill="#0f1729"/><text x="512" y="426" fill="#46577d" font-size="10" text-anchor="middle">Lat. der.</text>
  <rect x="570" y="398" width="104" height="48" rx="7" fill="#0f1729"/><text x="622" y="426" fill="#46577d" font-size="10" text-anchor="middle">Techo</text>
  <!-- verdict -->
  <rect x="704" y="74" width="272" height="206" rx="12" class="card"/>
  <text x="722" y="100" class="h">🤖 Veredicto IA</text>
  <rect x="722" y="112" width="100" height="22" rx="11" fill="#fee2e2"/><text x="772" y="127" class="red" font-size="10.5" font-weight="bold" text-anchor="middle">2 daños nuevos</text>
  <rect x="828" y="112" width="120" height="22" rx="11" fill="#eef1f6"/><text x="888" y="127" class="m" font-size="10.5" font-weight="bold" text-anchor="middle">0 preexistentes</text>
  <text x="722" y="158" class="m" font-size="11">Responsable sugerido</text>
  <text x="722" y="176" class="t" font-size="12.5" font-weight="bold">Carlos M. · turno 14/06</text>
  <text x="722" y="202" class="m" font-size="11">Taller sugerido</text>
  <text x="722" y="220" class="t" font-size="12.5" font-weight="bold">Chapa Vigo · 2,1 km · ⭐4,6</text>
  <text x="722" y="246" class="m" font-size="11">Coste estimado reparación</text>
  <text x="722" y="266" class="red" font-size="14" font-weight="bold">≈ 320 €</text>
  <!-- actions -->
  <rect x="704" y="292" width="272" height="212" rx="12" class="card"/>
  <text x="722" y="318" class="h">Acción</text>
  <rect x="722" y="330" width="236" height="38" rx="9" class="b"/><text x="840" y="354" class="w" font-size="12.5" font-weight="bold" text-anchor="middle">✓ Imputar al conductor</text>
  <rect x="722" y="376" width="236" height="38" rx="9" fill="#fff" stroke="#e6eaf0"/><text x="840" y="400" class="t" font-size="12.5" font-weight="bold" text-anchor="middle">✎ Corregir daños</text>
  <rect x="722" y="422" width="236" height="38" rx="9" fill="#fff" stroke="#e6eaf0"/><text x="840" y="446" class="t" font-size="12.5" font-weight="bold" text-anchor="middle">✕ Descartar (falso positivo)</text>
  <text x="722" y="482" class="m" font-size="10.5">Cada corrección reentrena la asignación.</text>
  <text x="722" y="497" class="m" font-size="10.5">La IA mejora con tu feedback.</text>
  <text x="222" y="528" class="m" font-size="11">02 · Revisión de inspección con IA — el corazón del producto. Revisa 30 inspecciones en minutos.</text>
</svg>
