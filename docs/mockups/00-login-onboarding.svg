<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .bg{fill:#eef1f6}.card{fill:#fff;stroke:#e6eaf0}.t{fill:#0f172a}.m{fill:#64748b}.w{fill:#fff}.b{fill:#3b5bdb}
    .green{fill:#16a34a};text{font-size:12px}
  </style>
  <rect width="1000" height="420" class="bg"/>
  <text x="500" y="30" class="b" font-size="13" font-weight="bold" text-anchor="middle">00 · ACCESO Y ALTA DE EMPRESA (autoservicio)</text>

  <!-- LOGIN -->
  <g transform="translate(40,52)">
    <rect width="440" height="320" rx="14" class="card"/>
    <rect width="200" height="320" rx="14" fill="#0f1729"/>
    <rect x="186" width="14" height="320" fill="#13203b"/>
    <rect x="24" y="26" width="26" height="26" rx="7" fill="#3b5bdb"/><text x="58" y="44" class="w" font-size="14" font-weight="bold">FlotaDSP</text>
    <text x="24" y="120" class="w" font-size="20" font-weight="bold">Tu flota,</text>
    <text x="24" y="146" class="w" font-size="20" font-weight="bold">bajo control.</text>
    <text x="24" y="178" fill="#aebbd6" font-size="11">IA de daños, scorecard de</text>
    <text x="24" y="194" fill="#aebbd6" font-size="11">Amazon, turnos y alertas.</text>
    <text x="24" y="240" fill="#8ea1c6" font-size="11">✓ Daños imputados</text>
    <text x="24" y="262" fill="#8ea1c6" font-size="11">✓ Scorecard al día</text>
    <!-- form -->
    <text x="232" y="56" class="t" font-size="17" font-weight="bold">Inicia sesión</text>
    <text x="232" y="76" class="m" font-size="11">Bienvenido de nuevo</text>
    <text x="232" y="112" class="t" font-size="10" font-weight="bold">EMAIL</text>
    <rect x="232" y="120" width="184" height="34" rx="8" fill="#fbfcfe" stroke="#e6eaf0"/><text x="244" y="142" class="m" font-size="11">admin@transportesgarcia.es</text>
    <text x="232" y="178" class="t" font-size="10" font-weight="bold">CONTRASEÑA</text>
    <rect x="232" y="186" width="184" height="34" rx="8" fill="#fbfcfe" stroke="#e6eaf0"/><text x="244" y="208" class="m" font-size="13">••••••••••</text>
    <rect x="232" y="234" width="184" height="38" rx="9" class="b"/><text x="324" y="258" class="w" font-size="13" font-weight="bold" text-anchor="middle">Entrar</text>
    <text x="324" y="296" class="m" font-size="11" text-anchor="middle">¿Sin cuenta? <tspan class="b" font-weight="bold">Registra tu empresa →</tspan></text>
  </g>

  <!-- ONBOARDING -->
  <g transform="translate(520,52)">
    <rect width="440" height="320" rx="14" class="card"/>
    <rect x="30" y="28" width="62" height="6" rx="3" fill="#3b5bdb"/><rect x="98" y="28" width="62" height="6" rx="3" fill="#3b5bdb"/><rect x="166" y="28" width="62" height="6" rx="3" fill="#e6eaf0"/><rect x="234" y="28" width="62" height="6" rx="3" fill="#e6eaf0"/>
    <text x="30" y="64" class="t" font-size="16" font-weight="bold">Elige tu plan</text>
    <text x="30" y="84" class="m" font-size="11">14 días gratis · sin tarjeta · cancela cuando quieras</text>
    <!-- plan cards -->
    <rect x="30" y="100" width="120" height="84" rx="10" fill="#fff" stroke="#e6eaf0"/>
    <text x="90" y="124" class="t" font-size="12" font-weight="bold" text-anchor="middle">Starter</text>
    <text x="90" y="148" class="b" font-size="18" font-weight="bold" text-anchor="middle">79€</text>
    <text x="90" y="168" class="m" font-size="10" text-anchor="middle">≤10 furgos</text>
    <rect x="160" y="100" width="120" height="84" rx="10" fill="#eef1ff" stroke="#3b5bdb" stroke-width="2"/>
    <text x="220" y="124" class="t" font-size="12" font-weight="bold" text-anchor="middle">Growth</text>
    <text x="220" y="148" class="b" font-size="18" font-weight="bold" text-anchor="middle">199€</text>
    <text x="220" y="168" class="m" font-size="10" text-anchor="middle">≤30 furgos</text>
    <rect x="290" y="100" width="120" height="84" rx="10" fill="#fff" stroke="#e6eaf0"/>
    <text x="350" y="124" class="t" font-size="12" font-weight="bold" text-anchor="middle">Pro</text>
    <text x="350" y="148" class="b" font-size="18" font-weight="bold" text-anchor="middle">349€</text>
    <text x="350" y="168" class="m" font-size="10" text-anchor="middle">≤60 · multi</text>
    <text x="30" y="214" class="t" font-size="10" font-weight="bold">Nº APROXIMADO DE VEHÍCULOS</text>
    <rect x="30" y="222" width="380" height="34" rx="8" fill="#fbfcfe" stroke="#e6eaf0"/><text x="44" y="244" class="t" font-size="12">28</text>
    <rect x="30" y="268" width="380" height="38" rx="9" class="b"/><text x="220" y="292" class="w" font-size="13" font-weight="bold" text-anchor="middle">Continuar → Importar flota</text>
  </g>
</svg>
